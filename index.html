<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8"/>
<title>AI Agents Flow — En>ACT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
html,body{height:100%;margin:0;}
body{font-family:'Inter',system-ui,sans-serif;background:#FAFAFB;color:#212121;-webkit-font-smoothing:antialiased;}
button{font-family:inherit;}
@keyframes aiSpin {from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes aiPulse{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.08);opacity:.85;}}
@keyframes fadeIn {from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
@keyframes slideIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
@keyframes slideInRight{from{opacity:0;transform:translateX(32px);}to{opacity:1;transform:none;}}
/* ── New wow animations ─────────────────────────────────────────────────── */
@keyframes dataFlow{from{stroke-dashoffset:60;}to{stroke-dashoffset:0;}}
@keyframes neuralPulse{0%,100%{opacity:.18;}50%{opacity:.85;}}
@keyframes orbitCCW{from{transform:rotate(0deg);}to{transform:rotate(-360deg);}}
@keyframes shimmerSlide{0%{transform:translateX(-100%);}100%{transform:translateX(300%);}}
@keyframes particleFloat{0%{opacity:0;transform:translate(0,0) scale(0);}18%{opacity:.95;}80%{opacity:.3;}100%{opacity:0;transform:translate(var(--ptx),var(--pty)) scale(.1);}}
@keyframes rippleOut{0%{transform:scale(1);opacity:.55;}100%{transform:scale(3.2);opacity:0;}}
@keyframes gridDrift{0%{background-position:0 0;}100%{background-position:40px 40px;}}
@keyframes glowApply{0%,100%{box-shadow:0 2px 8px rgba(35,100,67,.25),0 0 0 0 rgba(35,100,67,0);}50%{box-shadow:0 6px 24px rgba(35,100,67,.4),0 0 0 6px rgba(35,100,67,.14);}}
@keyframes stampIn{0%{transform:scale(1.18);opacity:0;}55%{transform:scale(.97);}100%{transform:scale(1);opacity:1;}}
@keyframes scanPulse{0%,100%{opacity:0;}40%,60%{opacity:1;}}
@keyframes nodeConnect{0%{stroke-dashoffset:80;opacity:0;}100%{stroke-dashoffset:0;opacity:1;}}
@keyframes tileGlow{0%,100%{box-shadow:none;}50%{box-shadow:0 0 0 3px rgba(68,112,173,.2),0 4px 20px rgba(68,112,173,.15);}}
.fadeIn{animation:fadeIn 220ms ease both;}
.slideIn{animation:slideIn 260ms cubic-bezier(.2,.6,.2,1) both;}
.slideInRight{animation:slideInRight 220ms cubic-bezier(.2,.6,.2,1) both;}
.stampIn{animation:stampIn 320ms cubic-bezier(.2,.6,.2,1) both;}
.glowApply{animation:glowApply 2.2s ease-in-out infinite;}

/* ── Tweaks panel ── */
.twk-panel{position:fixed;right:16px;bottom:68px;z-index:9998;width:280px;
  background:rgba(250,249,247,.96);color:#29261b;
  -webkit-backdrop-filter:blur(24px);backdrop-filter:blur(24px);
  border:.5px solid rgba(255,255,255,.6);border-radius:14px;
  box-shadow:0 12px 40px rgba(0,0,0,.18);
  font:11.5px/1.4 'Inter',system-ui,sans-serif;overflow:hidden;}
.twk-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 8px 10px 14px;}
.twk-hd b{font-size:12px;font-weight:600;}
.twk-x{appearance:none;border:0;background:transparent;color:rgba(41,38,27,.55);
  width:22px;height:22px;border-radius:6px;cursor:pointer;font-size:13px;}
.twk-x:hover{background:rgba(0,0,0,.06);color:#29261b;}
.twk-body{padding:4px 14px 14px;display:flex;flex-direction:column;gap:8px;}
.twk-sect{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:rgba(41,38,27,.45);padding-top:8px;}
.twk-sub{font-size:10px;color:rgba(41,38,27,.5);line-height:1.4;}
.twk-row-h{display:flex;flex-direction:row;align-items:center;justify-content:space-between;gap:10px;margin-top:6px;}
.twk-lbl{font-size:11.5px;font-weight:500;color:rgba(41,38,27,.72);}
.twk-hint{font-size:10px;color:rgba(41,38,27,.45);line-height:1.4;margin-top:4px;}
.twk-toggle{position:relative;width:32px;height:18px;border:0;border-radius:999px;
  background:rgba(0,0,0,.15);transition:background .15s;cursor:pointer;padding:0;flex-shrink:0;}
.twk-toggle[data-on="1"]{background:#34c759;}
.twk-toggle i{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;
  background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.25);transition:transform .15s;font-style:normal;display:block;}
.twk-toggle[data-on="1"] i{transform:translateX(14px);}

</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef, useCallback } = React;

// ── Tokens ───────────────────────────────────────────────────────────────────
const C = {
  ink:"#212121", ink2:"#5d6168", ink3:"#9aa0a6",
  muted:"#F5F6F8", surface:"#FAFAFB",
  line:"#E5E7EB", line2:"#CFD3D8",
  blue:"#44709D", blueH:"#37538C", blueT:"#C4E1F6", blueT2:"#EAF3FB",
  red:"#B23220", redBg:"#FECFD2", redT:"#FDECEC",
  amber:"#B05D00", amberBg:"#F7E7CB", amberT:"#FBF4E5",
  green:"#236443", greenBg:"#D9EFE2", greenT:"#EEF7F1",
  navy:"#263038",
  sans:"'Inter',system-ui,sans-serif",
};

// ── Agents (2-step flow) ─────────────────────────────────────────────────────
const AGENTS = [
  { id:"root", name:"Autonomous Root Cause", short:"Root Cause", glyph:"R", colour:"#44709D",
    tagline:"Automatically diagnoses reporting failures across fields, asset classes, counterparties and time periods — so you understand exactly what went wrong before you fix it.", duration:2600 },
  { id:"rem",  name:"Intelligent Remediation", short:"Rem & Sim", glyph:"F", colour:"#B05D00",
    tagline:"Generates a prioritised remediation plan, groups issues by root cause, simulates each fix against your data, and pre-populates your E&O notification — ready for Compliance sign-off.", duration:1800 },
];
const A = Object.fromEntries(AGENTS.map(a => [a.id, a]));

// ── Entity & regime ───────────────────────────────────────────────────────────
const ENTITY = { name:"Whale Capital", lei:"WHLCPT00MOCK00000120", type:"Electronic Money Institution", regime:"MiFID II / CFTC P45", arm:"DFR Reporting Platform" };

// ── Root cause data (DFR lineage — Whale Capital) ────────────────────────────────
const ROOT_CAUSES = [
  { id:"RC1", sev:"high", confidence:89,
    title:"Counterparty IDs can't be found for 3 trading partners",
    summary:"415 trade reports are failing because the LEI lookup table hasn't been updated since 3 new counterparties were onboarded in January. The system can't match them to a valid ID.",
    cluster:"Counterparty 2 LEI lookup failure — FX Swap/Forward",
    entity:"Whale Capital", records:415,
    assetClass:"FX Swap / Forward", regime:"CFTC P45 / MiFID II RTS22",
    fieldRef:"1_14_counterparty_2", fieldLabel:"Counterparty 2 Identifier",
    transformType:"Lookup (Client ID → Legal Entity Identifier)",
    counterparties:["Alderton Capital International","Castleford Bank Plc","Meridian Securities & Co"],
    breakdown:[{label:"ID not found in lookup table",n:287},{label:"Outdated ID returned",n:96},{label:"Field left blank",n:32}],
    dailyBreaks:[58,63,61,57,71,55,48],
    period:"14 Jan 2026 – 09 May 2026",
    chain:["Trade Feed (DFR)","Client ID lookup","LEI Reference Table","Counterparty 2 ID field","TRACC Repository"], breakAt:2,
    proposed:"Add the 3 missing counterparties to the LEI reference table, then re-generate the Counterparty 2 ID field for all 415 affected records and resubmit.",
    fix:"Update LEI reference table · Re-derive Counterparty 2 ID · Resubmit 415 records",
    evidence:[
      "89% of failures trace to the same 3 entries missing from the LEI reference table",
      "Table last updated 14 Jan 2026 — 3 counterparties onboarded since then with no table refresh",
      "The trade ID lookup chain itself is working correctly — failure is only at the final table lookup step",
      "287 records: no match found; 96 records: stale pre-merger ID returned; 32 records: field written blank",
      "Low cascade risk: collateral reports use a separate lookup pipeline, unaffected",
    ]},
  { id:"RC2", sev:"high", confidence:78,
    title:"Intragroup trades are misclassified — entity type flag ignored",
    summary:"184 reports have the wrong counterparty classification because the system's derivation logic doesn't check whether a trade is intragroup. For these trades, the financial entity indicator should be set to TRUE but isn't.",
    cluster:"Counterparty 2 financial entity indicator mismatch — intragroup trades",
    entity:"Whale Capital", records:184,
    assetClass:"FX Swap / Forward", regime:"CFTC P45 / MiFID II RTS22",
    fieldRef:"1_17_counterparty_2_financial_entity_indicator", fieldLabel:"CP2 Financial Entity Indicator",
    transformType:"Derived field (conditional rule — intragroup flag not consulted)",
    counterparties:["Hartwell Lynch International","Pemberton Chase Bank N.A."],
    breakdown:[{label:"Indicator blank — should be TRUE",n:141},{label:"Indicator FALSE — should be TRUE",n:43}],
    dailyBreaks:[22,31,18,29,25,34,25],
    period:"14 Jan 2026 – 09 May 2026",
    chain:["Trade Feed (DFR)","Intragroup flag + Counterparty value","Classification rule","Financial Entity Indicator field","TRACC Repository"], breakAt:2,
    proposed:"Add a rule to the derivation logic: if a trade is flagged as intragroup, set the Financial Entity Indicator to TRUE. Apply retroactively to 184 records for Hartwell Lynch International and Pemberton Chase Bank N.A.",
    fix:"Add intragroup derivation rule · Correct 184 records · Resubmit",
    evidence:[
      "78% of classification errors occur on trades already marked as intragroup in the source data",
      "The derivation rule doesn't reference the intragroup flag at all — confirmed missing from the rule specification",
      "The intragroup flag is present on every affected source row and accessible — just not being checked",
      "141 records: indicator blank where TRUE required; 43 records: indicator set to FALSE instead of TRUE",
      "Medium cascade risk: counterparty reconciliation scores for Hartwell Lynch affected — resolved once fix applied",
    ]},
  { id:"RC3", sev:"medium", confidence:74,
    title:"Notional amounts are being rounded — precision too low for submission",
    summary:"4,812 reports contain notional amounts rounded to 2 decimal places. Regulators require 6 decimal places. The formatting pipeline passes the value straight through without expanding the precision.",
    cluster:"Notional amount precision drift — leg 1 (FX Swap/Forward)",
    entity:"Whale Capital", records:4812,
    assetClass:"FX Swap / Forward", regime:"CFTC P45 / MiFID II RTS22",
    fieldRef:"1_31_notional_amt_leg_1", fieldLabel:"Notional Amount — Leg 1",
    transformType:"Formatting (direct mapping, no precision conversion applied)",
    counterparties:["VBK AG","Castleford Bank Plc","Alderton Capital International","Rheinfeld Bank AG"],
    breakdown:[{label:"Notional rounded to 2 decimal places",n:4812}],
    dailyBreaks:[690,701,688,712,695,714,612],
    period:"Estimated onset Q4 2025 — ongoing; detected 09 May 2026",
    chain:["Trade Feed (DFR)","Notional amount (2dp)","Format step — no precision expand","Notional Amount Leg 1 field","TRACC Repository"], breakAt:2,
    proposed:"Add a precision conversion step in the formatting pipeline: expand the notional amount from 2dp to 6dp before submission. Apply to all FX Swap/Forward records. Also check Leg 2 notional — it uses the same pipeline and likely has the same issue.",
    fix:"Add 6dp precision step · Fix 4,812 records · Check Leg 2 separately",
    evidence:[
      "Every single precision failure follows the same 2dp rounding pattern — all trace to the same source field",
      "The formatting pipeline maps the value directly with no conversion step — confirmed in the pipeline spec",
      "TRACC rejects submissions where notional precision is below 6dp",
      "The Leg 2 notional uses the same pipeline — likely affected by the same defect",
      "Low–medium cascade risk: valuation tolerance breach possible on 312 records against counterparty submissions",
    ]},
];

// ── Remediation fixes ────────────────────────────────────────────────────────
const INITIAL_FIXES = [
  { id:"FX-RC1", rcId:"RC1", title:"Fix counterparty ID lookup table",
    records:415, confidence:89, entity:"Whale Capital", field:"Counterparty 2 Identifier",
    desc:"Add 3 missing counterparties to the LEI reference table and re-generate the Counterparty 2 ID for all 415 affected FX trade reports." },
  { id:"FX-RC2", rcId:"RC2", title:"Fix intragroup trade classification",
    records:184, confidence:78, entity:"Whale Capital", field:"CP2 Financial Entity Indicator",
    desc:"Add a derivation rule so intragroup trades correctly set the Financial Entity Indicator to TRUE. Retroactively correct 184 FX trade reports." },
  { id:"FX-RC3", rcId:"RC3", title:"Fix notional amount precision",
    records:4812, confidence:74, entity:"Whale Capital", field:"Notional Amount — Leg 1",
    desc:"Add a precision conversion step so notional amounts are expanded to 6 decimal places before submission. Applies to 4,812 FX trade reports. Leg 2 should be assessed separately." },
];

// cascade fix auto-added when FX-RC2 simulation detects downstream break
const CASCADE_FIX = {
  id:"FX-RC4", rcId:"RC4", isCascade:true,
  title:"Rebuild reconciliation feed key",
  records:92, confidence:81, entity:"Whale Capital", field:"Counterparty recon feed key",
  desc:"Rebuilds the counterparty reconciliation feed key after the classification fix. Affects 92 records where the key now mismatches.",
};

// root cause for cascade fix — found by mini RC agent
const CASCADE_RC = {
  id:"RC4", confidence:83, sev:"high",
  title:"Reconciliation feed key not rebuilt after classification change",
  cluster:"Downstream cascade from intragroup classification fix",
  entity:"Whale Capital", records:92,
  chain:["Financial Entity Indicator field","Recon key builder","Recon feed key","TRACC Repository"], breakAt:1,
  proposed:"Rebuild the counterparty reconciliation feed key for 92 affected records after the classification change.",
  evidence:[
    "The reconciliation feed key includes the Financial Entity Indicator as one of its components",
    "Changing the indicator from FALSE to TRUE causes a key mismatch on 92 of the 184 corrected records",
    "The key-builder doesn't automatically re-run after the indicator changes — it needs to be triggered manually",
  ],
};

// ── Simulation results ────────────────────────────────────────────────────────
const SIM_RESULTS_CASCADE = {
  "FX-RC1":{ status:"safe", ftr:96, readiness:"+6pts",
    detail:"415 records corrected · Counterparty IDs re-generated and validated · Safe to back-report.",
    note:"Note: the identifier source field was also re-evaluated for 89 records — confirm source codes look correct before submitting." },
  "FX-RC2":{ status:"cascade", ftr:91, readiness:"—",
    detail:"184 records corrected · but this change broke something downstream. The counterparty reconciliation feed key no longer matches for 92 records — this needs to be fixed first.",
    cascadeChain:["Trade Feed (DFR)","Intragroup flag","Classification rule","Recon feed key","TRACC"],
    cascadeFix: CASCADE_FIX },
  "FX-RC3":{ status:"human", ftr:88, readiness:"+3pts",
    detail:"4,812 records affected · Needs a human decision before proceeding.",
    reason:"Changing the notional precision may cause a valuation mismatch against what 312 counterparties submitted. Someone needs to review this before resubmitting. Also — the Leg 2 notional uses the same pipeline and likely has the same problem." },
  "FX-RC4":{ status:"safe", ftr:81, readiness:"+2pts",
    detail:"92 records fixed · Reconciliation feed key rebuilt and re-synced · Cascade from the classification fix fully resolved." },
};
const SIM_RESULTS_CLEAN = {
  "FX-RC1":{ status:"safe", ftr:96, readiness:"+6pts",
    detail:"415 records corrected · Counterparty IDs re-generated · 96% first-time-right · Safe to back-report." },
  "FX-RC2":{ status:"safe", ftr:91, readiness:"+3pts",
    detail:"184 records corrected · Classification updated · Reconciliation feed unaffected · Safe to back-report." },
  "FX-RC3":{ status:"human", ftr:88, readiness:"+3pts",
    detail:"4,812 records affected · Needs a human decision before proceeding.",
    reason:"Changing the notional precision may cause a valuation mismatch on 312 records against counterparty submissions. Compliance sign-off is required before resubmitting." },
};

// ── Primitives ────────────────────────────────────────────────────────────────
const Btn = ({children,variant="default",size="md",onClick,disabled,style})=>{
  const sz={sm:{h:30,px:12,fs:12},md:{h:38,px:16,fs:13},lg:{h:46,px:22,fs:14}}[size];
  const V={
    primary:{bg:C.blue,fg:"#fff",bd:C.blue,hbg:C.blueH},
    danger: {bg:C.red, fg:"#fff",bd:C.red, hbg:"#8e2818"},
    ghost:  {bg:"transparent",fg:C.ink,bd:"transparent",hbg:C.muted},
    soft:   {bg:C.blueT2,fg:C.blue,bd:C.blueT,hbg:C.blueT},
    default:{bg:"#fff",fg:C.ink,bd:C.line2,hbg:C.muted},
  }[variant];
  const [h,setH]=useState(false);
  return(
    <button onClick={disabled?undefined:onClick} disabled={disabled}
      onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
      style={{display:"inline-flex",alignItems:"center",justifyContent:"center",gap:8,
        height:sz.h,padding:`0 ${sz.px}px`,
        background:h&&!disabled?V.hbg:V.bg,color:V.fg,
        border:`1px solid ${V.bd}`,borderRadius:8,
        fontFamily:C.sans,fontSize:sz.fs,fontWeight:600,
        cursor:disabled?"not-allowed":"pointer",opacity:disabled?.45:1,
        whiteSpace:"nowrap",transition:"all 120ms ease",...style}}>
      {children}
    </button>
  );
};

const Pill=({children,bg="#EEF0F3",fg=C.ink2,style})=>(
  <span style={{display:"inline-flex",alignItems:"center",gap:5,
    padding:"3px 10px",borderRadius:999,
    background:bg,color:fg,fontSize:11,fontWeight:600,fontFamily:C.sans,...style}}>{children}</span>
);

const SEV={
  high:  {bg:C.redBg,  fg:C.red,   l:"High"},
  medium:{bg:C.amberBg,fg:C.amber, l:"Medium"},
  low:   {bg:C.blueT,  fg:C.blue,  l:"Low"},
};
const Sev=({level})=>{const s=SEV[level];return<Pill bg={s.bg} fg={s.fg}><span style={{width:6,height:6,borderRadius:999,background:s.fg}}/>{s.l}</Pill>;};

const Glyph=({a,size=36})=>(
  <div style={{width:size,height:size,borderRadius:999,background:a.colour,color:"#fff",
    display:"inline-flex",alignItems:"center",justifyContent:"center",
    fontFamily:C.sans,fontWeight:700,fontSize:size*.42,flexShrink:0}}>{a.glyph}</div>
);

const AIStar=({size=16,colour=C.blue,spin})=>(
  <svg width={size} height={size} viewBox="0 0 16 16"
    style={{animation:spin?"aiSpin 1.4s linear infinite":undefined,flexShrink:0}}>
    <g fill={colour}>
      <path d="M8 0.5 L9 6.5 L8 8 L7 6.5 Z"/>
      <path d="M8 15.5 L7 9.5 L8 8 L9 9.5 Z"/>
      <path d="M0.5 8 L6.5 7 L8 8 L6.5 9 Z"/>
      <path d="M15.5 8 L9.5 9 L8 8 L9.5 7 Z"/>
      <circle cx="8" cy="8" r="1.4"/>
    </g>
  </svg>
);

const Card=({children,padding=24,style,hover,onClick})=>{
  const [h,setH]=useState(false);
  return(
    <div onClick={onClick}
      onMouseEnter={()=>hover&&setH(true)} onMouseLeave={()=>hover&&setH(false)}
      style={{background:"#fff",border:`1px solid ${h?C.blue:C.line}`,borderRadius:10,
        padding,cursor:onClick?"pointer":"default",
        boxShadow:h?`0 6px 16px ${C.blue}22`:"none",
        transition:"all 140ms ease",...style}}>{children}</div>
  );
};

const Donut=({value,colour=C.green,size=88,label})=>{
  const r=38,circ=2*Math.PI*r,dash=(value/100)*circ;
  return(
    <div style={{position:"relative",width:size,height:size,flexShrink:0}}>
      <svg width={size} height={size} viewBox="0 0 88 88">
        <circle cx="44" cy="44" r={r} fill="none" stroke={C.muted} strokeWidth="8"/>
        <circle cx="44" cy="44" r={r} fill="none" stroke={colour} strokeWidth="8"
          strokeDasharray={`${dash} ${circ}`} strokeDashoffset={circ/4}
          strokeLinecap="round" transform="rotate(-90 44 44)"/>
      </svg>
      <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
        <span style={{fontSize:20,fontWeight:700,color:C.ink,letterSpacing:"-0.02em"}}>{value}</span>
        {label&&<span style={{fontSize:9,color:C.ink2,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em"}}>{label}</span>}
      </div>
    </div>
  );
};

const ConfBar=({value,colour=C.blue})=>(
  <div>
    <div style={{height:4,background:C.muted,borderRadius:999,overflow:"hidden",marginBottom:3}}>
      <div style={{width:`${value}%`,height:"100%",background:colour,borderRadius:999}}/>
    </div>
    <span style={{fontSize:10,color:C.ink2}}>{value}% confidence</span>
  </div>
);

// ── Live clock ────────────────────────────────────────────────────────────────
const Clock=()=>{
  const [t,setT]=useState(()=>new Date());
  useEffect(()=>{const id=setInterval(()=>setT(new Date()),30000);return()=>clearInterval(id);},[]);
  const pad=n=>String(n).padStart(2,"0");
  const months=["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];
  return(
    <div style={{display:"flex",alignItems:"center",gap:6,flexShrink:0,
      fontSize:11,fontWeight:600,color:C.ink2,
      padding:"5px 12px",borderRadius:999,background:C.muted,border:`1px solid ${C.line}`}}>
      <span style={{fontSize:12,lineHeight:1}}>🕐</span>
      <span>{t.getDate()} {months[t.getMonth()]} {t.getFullYear()}</span>
      <span style={{color:C.line2,fontWeight:400}}>·</span>
      <span style={{color:C.ink,fontWeight:700}}>{pad(t.getHours())}:{pad(t.getMinutes())}</span>
    </div>
  );
};

// ── Tracker (3-step) ──────────────────────────────────────────────────────────
const Tracker=({stage})=>{
  const steps=[
    {id:"root", label:"Root Cause"},
    {id:"sim",  label:"Simulation"},
    {id:"plan", label:"Rem Plan"},
  ];
  const stateOf=id=>{
    if(stage==="macro")        return id==="root"?"active":"pending";
    if(stage==="running:root") return id==="root"?"running":"pending";
    if(stage==="review:root")  return id==="root"?"review":"pending";
    if(stage==="remediation")  return id==="root"?"done":id==="sim"?"active":"pending";
    if(stage==="plan")         return id==="plan"?"active":"done";
    if(stage==="done")         return "done";
    return "pending";
  };
  const colOf=id=>{
    const st=stateOf(id);
    if(st==="done") return C.green;
    if(st==="running"||st==="active") return id==="root"?A.root.colour:id==="sim"?C.blue:A.rem.colour;
    if(st==="review") return A.root.colour;
    return C.line2;
  };
  return(
    <div style={{display:"flex",alignItems:"center",padding:"10px 16px",
      background:"#fff",border:`1px solid ${C.line}`,borderRadius:999,
      boxShadow:"0 2px 6px rgba(0,0,0,0.04)",gap:0,flex:1}}>
      {steps.map((s,i)=>{
        const st=stateOf(s.id);
        const colour=colOf(s.id);
        const lbl=st==="done"?"✓ Done":st==="running"?"Running…":st==="review"?"Awaiting review":st==="active"?"In progress":"Queued";
        return(
          <React.Fragment key={s.id}>
            <div style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:28,height:28,borderRadius:999,
                background:st==="pending"?"#fff":colour,color:st==="pending"?colour:"#fff",
                border:`1.5px solid ${colour}`,
                display:"inline-flex",alignItems:"center",justifyContent:"center",
                fontWeight:700,fontSize:12,
                boxShadow:(st==="running"||st==="active")?`0 0 0 4px ${colour}22`:"none",
                animation:st==="running"?"aiPulse 1.8s ease-in-out infinite":undefined}}>
                {st==="done"?"✓":i+1}
              </div>
              <div style={{display:"flex",flexDirection:"column"}}>

// ── Lineage diagram ───────────────────────────────────────────────────────────
const LineageDiagram=({chain,breakAt,col})=>{
  const n=chain.length;
  const nodeCfg=i=>{
    const isBreak=i===breakAt, isAfter=i>breakAt, isFirst=i===0, isLast=i===n-1;
    if(isBreak) return {bg:C.redBg,   stroke:C.red,   fg:C.red,   lbl:"⚠ Break point", bold:true};
    if(isFirst) return {bg:C.blueT2,  stroke:C.blue,  fg:C.blue,  lbl:"Source"};
    if(isLast)  return {bg:C.muted,   stroke:C.line2, fg:C.ink,   lbl:"Destination"};
    if(isAfter) return {bg:"#F9F9F9", stroke:C.line,  fg:C.ink3,  lbl:"Affected"};
    return       {bg:"#fff",   stroke:C.line2, fg:C.ink,   lbl:"Transform"};
  };
  const connCol=i=>i>breakAt?C.line:i===breakAt?C.red:`${C.blue}77`;
  const connDash=i=>i>breakAt?"dashed":"solid";
  return(
    <div style={{overflowX:"auto",paddingBottom:6}}>
      <div style={{display:"flex",alignItems:"flex-start",minWidth:"fit-content",paddingTop:32,paddingBottom:8}}>
        {chain.map((node,i)=>{
          const c=nodeCfg(i);
          const isBreak=i===breakAt, isAfter=i>breakAt;
          return(
            <React.Fragment key={i}>
              {/* connector */}
              {i>0&&(
                <div style={{display:"flex",alignItems:"center",width:40,flexShrink:0,marginTop:44}}>
                  <div style={{flex:1,height:0,
                    borderTop:`2px ${connDash(i)} ${connCol(i)}`}}/>
                  <div style={{width:0,height:0,flexShrink:0,
                    borderTop:"5px solid transparent",borderBottom:"5px solid transparent",
                    borderLeft:`6px solid ${connCol(i)}`}}/>
                </div>
              )}
              {/* node */}
              <div style={{display:"flex",flexDirection:"column",alignItems:"center",flexShrink:0,position:"relative"}}>
                {/* label badge */}
                <div style={{
                  fontSize:8,fontWeight:700,marginBottom:6,padding:"3px 9px",borderRadius:999,
                  whiteSpace:"nowrap",textTransform:"uppercase",letterSpacing:"0.07em",
                  color:isBreak?"#fff":c.fg,
                  background:isBreak?C.red:isAfter?"#EBEBEB":"transparent",
                  border:isBreak?"none":isAfter?`1px solid ${C.line}`:"none",
                  boxShadow:isBreak?`0 0 0 4px ${C.red}20`:"none",
                  animation:isBreak?"aiPulse 2.2s ease-in-out infinite":undefined}}>
                  {c.lbl}
                </div>
                {/* box */}
                <div style={{
                  width:114,padding:"10px 12px",borderRadius:9,textAlign:"center",
                  background:c.bg,
                  border:`${isBreak?2:1}px solid ${c.stroke}`,
                  opacity:isAfter?.6:1,
                  boxShadow:isBreak?`0 0 0 5px ${C.red}12,0 4px 16px ${C.red}20`:"none",
                  outline:isBreak?`2px dashed ${C.red}55`:"none",outlineOffset:4}}>
                  <div style={{fontSize:11,fontWeight:isBreak?700:600,color:c.fg,lineHeight:1.4}}>{node}</div>
                </div>
                {/* failure pin below break node */}
                {isBreak&&(
                  <div style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,marginTop:6}}>
                    <div style={{width:2,height:10,background:C.red,opacity:.5}}/>
                    <div style={{fontSize:9,fontWeight:700,color:C.red,
                      padding:"2px 9px",borderRadius:4,whiteSpace:"nowrap",
                      background:C.redBg,border:`1px solid ${C.red}44`}}>
                      Failure here
                    </div>
                  </div>
                )}
              </div>
            </React.Fragment>
          );
        })}
      </div>
    </div>
  );
};

                        {(()=>{
                          const vals=rc.dailyBreaks;

                {/* AI confidence signals */}

                  background:`linear-gradient(135deg,${C.blueT2},#fff)`,

                  {/* header */}

                      background:`radial-gradient(circle at 34% 34%,${C.blue}CC,${C.blue}55)`,
                      border:`1.5px solid ${C.blue}`,flexShrink:0,
                      display:"flex",alignItems:"center",justifyContent:"center"}}>
                      <AIStar size={12} colour="#fff"/>
                    </div>
                    <div style={{flex:1}}>
                      <div style={{fontSize:12,fontWeight:700,color:C.ink}}>AI confidence analysis</div>
                      <div style={{fontSize:10,color:C.blue,fontWeight:600,marginTop:1}}>
                        {rc.confidence}% confidence · {rc.evidence.length} signals detected

                    </div>
                    <div style={{flexShrink:0}}>
                      <div style={{height:6,width:80,background:`${C.blue}22`,borderRadius:999,overflow:"hidden"}}>
                        <div style={{height:"100%",width:`${rc.confidence}%`,
                          background:`linear-gradient(90deg,${C.blue},${A.root.colour})`,borderRadius:999}}/>
                      </div>
                    </div>
                  </div>

                  {/* signal rows */}
                  <div style={{display:"flex",flexDirection:"column"}}>
                    {rc.evidence.map((e,i)=>{
                      const isLast=i===rc.evidence.length-1;
                      const isCascade=e.toLowerCase().includes("cascade")||e.toLowerCase().includes("risk");
                      const signalColour=isCascade?C.amber:C.green;
                      const signalBg=isCascade?C.amberBg:C.greenBg;
                      const signalIcon=isCascade?"⚠":"✓";
                      return(
                        <div key={i} style={{
                          padding:"11px 16px",
                          borderBottom:isLast?"none":`1px solid ${C.blue}15`,
                          display:"flex",gap:12,alignItems:"flex-start",
                          background:i%2===0?"transparent":"rgba(255,255,255,.45)"}}>
                          {/* signal icon */}
                          <div style={{width:22,height:22,borderRadius:6,flexShrink:0,marginTop:1,
                            background:signalBg,
                            display:"flex",alignItems:"center",justifyContent:"center",
                            fontSize:10,fontWeight:800,color:signalColour}}>
                            {signalIcon}
                          </div>
                          <div style={{flex:1}}>
                            <div style={{fontSize:12,color:C.ink,lineHeight:1.6}}>{e}</div>
                            <div style={{display:"flex",alignItems:"center",gap:5,marginTop:5}}>
                              <AIStar size={9} colour={C.blue}/>
                              <span style={{fontSize:9,color:C.blue,fontWeight:600,letterSpacing:"0.04em"}}>
                                {isCascade?"Risk signal":"Evidence trace"} · En&gt;ACT agent
                              </span>
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                </div>
              </div>
            </div>
          );
        })()}
      </div>{/* end body split */}

      {/* footer */}
      <div style={{padding:"14px 40px",borderTop:`1px solid ${C.line}`,background:"#fff",display:"flex",alignItems:"center",gap:12}}>
        {selList.length===0?(
          <span style={{fontSize:12,color:C.red,fontWeight:600}}>⚠ Select at least one root cause to proceed</span>
        ):(
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:12,color:C.ink}}>
              Proceeding with <b>{selList.length} of {ROOT_CAUSES.length}</b> root causes

            </span>
            {deferList.length>0&&(
              <Pill bg={C.muted} fg={C.ink3}>{deferList.length} deferred</Pill>
            )}
          </div>
        )}
        <div style={{flex:1}}/>
        <Btn variant="primary" size="md" disabled={selList.length===0} onClick={onNext}>
          Proceed to simulation →
        </Btn>
      </div>
    </div>
  );
};

// ── Mini RC agent — runs inside cascade fix card ──────────────────────────────
const MINI_NN=[
  {cx:20,cy:24,r:3},{cx:58,cy:12,r:2.5},{cx:100,cy:22,r:3.5},
  {cx:142,cy:12,r:2.5},{cx:180,cy:24,r:3},{cx:58,cy:36,r:2},{cx:120,cy:36,r:2},
];
const MINI_EDGES=[[0,1],[1,2],[2,3],[3,4],[1,5],[5,2],[2,6],[6,3]];

const CascadeRCMini=({onDone})=>{
  const [pct,setPct]=useState(0);
  const [step,setStep]=useState(0);
  const steps=["Tracing cascade origin","Mapping downstream consumers","Scoring confidence"];
  useEffect(()=>{
    const dur=2400,start=Date.now();
    const t=setInterval(()=>{
      const p=Math.min(1,(Date.now()-start)/dur);
      setPct(p);setStep(Math.min(steps.length-1,Math.floor(p*steps.length)));
      if(p>=1){clearInterval(t);setTimeout(onDone,160);}
    },60);
    return()=>clearInterval(t);
  },[]);
  return(
    <div style={{padding:"12px 14px 13px",borderTop:`1px solid ${C.line}`,
      background:"linear-gradient(135deg,#EEF4FF,#F6FAFF)",position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",inset:0,pointerEvents:"none",
        background:"linear-gradient(90deg,transparent,rgba(68,112,173,.06),transparent)",
        animation:"shimmerSlide 2s ease infinite"}}/>

      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,position:"relative"}}>
        <div style={{width:24,height:24,borderRadius:999,
          background:`radial-gradient(circle,${C.blueT},${C.blueT2})`,
          border:`1.5px solid ${C.blue}55`,flexShrink:0,
          display:"flex",alignItems:"center",justifyContent:"center",
          boxShadow:`0 0 10px ${C.blue}44`}}>
          <AIStar size={12} colour={C.blue} spin/>
        </div>
        <span style={{fontSize:11,fontWeight:700,color:C.blue,flex:1}}>Root Cause Analysis running</span>
        <span style={{fontSize:10,color:C.ink2,fontStyle:"italic"}}>{steps[step]}…</span>
        <span style={{fontSize:10,fontWeight:700,color:C.blue,marginLeft:6}}>{Math.round(pct*100)}%</span>
      </div>

      <svg width="200" height="50" style={{display:"block",marginBottom:7,overflow:"visible",position:"relative"}}>
        {MINI_EDGES.map(([a,b],i)=>(
          <line key={i} x1={MINI_NN[a].cx} y1={MINI_NN[a].cy} x2={MINI_NN[b].cx} y2={MINI_NN[b].cy}
            stroke={C.blue} strokeWidth="1" strokeDasharray="4 4" opacity=".4"
            style={{animationName:"dataFlow",animationDuration:`${1.6+i*.14}s`,
              animationTimingFunction:"linear",animationIterationCount:"infinite"}}/>
        ))}
        {MINI_NN.map((n,i)=>(
          <circle key={i} cx={n.cx} cy={n.cy} r={n.r} fill={C.blue}
            style={{animationName:"neuralPulse",animationDuration:`${1.3+i*.18}s`,
              animationTimingFunction:"ease-in-out",animationIterationCount:"infinite",
              animationDelay:`${i*.12}s`}}/>
        ))}
        <rect x="0" y="44" width="200" height="3" rx="1.5" fill={C.line}/>
        <rect x="0" y="44" width={`${pct*200}`} height="3" rx="1.5" fill={C.blue} opacity=".8"
          style={{transition:"width 60ms linear"}}/>
      </svg>

      <div style={{display:"flex",gap:4,alignItems:"center",position:"relative"}}>
        {steps.map((s,i)=>(
          <React.Fragment key={i}>
            <div style={{padding:"2px 8px",borderRadius:999,fontSize:9,fontWeight:600,
              background:i<step?C.blue:i===step?C.blueT2:C.muted,
              border:`1px solid ${i<=step?C.blue:C.line}`,
              color:i<step?"#fff":i===step?C.blue:C.ink3,
              boxShadow:i===step?`0 0 8px ${C.blue}44`:"none",
              display:"flex",alignItems:"center",gap:3,
              transition:"all .2s ease"}}>
              {i<step?"✓":i===step?<AIStar size={7} colour={C.blue} spin/>:"·"} {s}
            </div>
            {i<steps.length-1&&<span style={{color:C.line2,fontSize:10}}>›</span>}
          </React.Fragment>
        ))}
      </div>
    </div>
  );
};

      )}
    </div>
  );

        <div style={{fontSize:14,fontWeight:700,color:C.ink,lineHeight:1.3,marginBottom:10}}>

        <div style={{display:"flex",borderRadius:9,overflow:"hidden",border:`1px solid ${C.line}`}}>
          {[
            {label:"Records",  value:p.records.toLocaleString(), col:sevCol(p.severity)},
            {label:"Notional", value:p.exposure,                 col:C.blue},
            {label:"Confidence",value:p.confidence+"%",          col:p.confidence>=85?C.green:p.confidence>=75?C.amber:C.red},

              <div style={{fontSize:15,fontWeight:800,color:m.col,lineHeight:1}}>{m.value}</div>
              <div style={{fontSize:9,color:C.ink3,fontWeight:600,marginTop:2,

      {/* ── Root cause technical brief ── */}
      <div style={{padding:"10px 18px",borderBottom:`1px solid ${C.line}`,background:"#FAFBFC"}}>
        <div style={{fontSize:9,fontWeight:700,color:C.ink3,textTransform:"uppercase",
          letterSpacing:"0.08em",marginBottom:5}}>Technical root cause</div>
        <div style={{fontSize:11,color:C.ink,lineHeight:1.6,
          fontFamily:"ui-monospace,SFMono-Regular,monospace",
          background:"#F1F3F5",borderRadius:7,padding:"8px 10px",
          border:`1px solid ${C.line}`}}>
          {p.rootCause}
        </div>
      </div>

      {/* ── Vertical stepper ── */}
      <div style={{padding:"14px 18px 10px"}}>
        <div style={{fontSize:9,fontWeight:700,color:C.ink3,textTransform:"uppercase",
          letterSpacing:"0.08em",marginBottom:12}}>
          Execution plan · {p.steps.length} steps · {p.steps.filter(s=>s.type==="human"||s.type==="review").length} human · {p.steps.filter(s=>s.type==="assisted").length} En:ACT assisted
        </div>

        {p.steps.map((s,i)=>{
          const t=STEP_TYPE[s.type];
          const isLast=i===p.steps.length-1;
          return(
            <div key={i} style={{display:"flex",gap:0,position:"relative"}}>
              {/* connector line */}
              {!isLast&&(
                <div style={{position:"absolute",left:13,top:28,width:2,
                  height:"calc(100% - 4px)",
                  background:`linear-gradient(180deg,${t.dot}44,${STEP_TYPE[p.steps[i+1].type].dot}22)`,
                  zIndex:0}}/>
              )}

              {/* step number circle */}
              <div style={{flexShrink:0,width:28,height:28,borderRadius:999,zIndex:1,
                background:t.dot,color:"#fff",
                display:"flex",alignItems:"center",justifyContent:"center",
                fontSize:11,fontWeight:800,marginRight:12,marginTop:1,
                boxShadow:`0 0 0 3px ${t.dot}22`}}>
                {s.num}
              </div>

              {/* step body */}
              <div style={{flex:1,paddingBottom:isLast?0:18}}>
                {/* step header */}
                <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:6,flexWrap:"wrap"}}>
                  <span style={{fontSize:12,fontWeight:700,color:C.ink}}>{s.title}</span>
                  <span style={{fontSize:10,fontWeight:600,color:t.fg,
                    background:t.bg,padding:"1px 8px",borderRadius:99,
                    border:`1px solid ${t.dot}33`}}>
                    {t.icon} {t.label}
                  </span>
                </div>

                {/* what the step does */}
                <div style={{fontSize:11,color:C.ink2,lineHeight:1.6,marginBottom:8}}>{s.what}</div>

                {/* input / output */}
                <div style={{display:"flex",gap:6,marginBottom:s.detail?8:0}}>
                  {[{label:"INPUT",val:s.input,col:"#6B7280"},{label:"OUTPUT",val:s.output,col:C.green}].map((io,j)=>(
                    <div key={j} style={{flex:1,padding:"6px 9px",borderRadius:7,
                      background:j===0?"#F8F9FA":"#F0FDF4",
                      border:`1px solid ${j===0?C.line:"#BBF7D0"}`}}>
                      <div style={{fontSize:8,fontWeight:700,color:io.col,textTransform:"uppercase",
                        letterSpacing:"0.08em",marginBottom:3}}>{io.label}</div>
                      <div style={{fontSize:10,color:C.ink2,lineHeight:1.4,
                        fontFamily:"ui-monospace,SFMono-Regular,monospace"}}>{io.val}</div>
                    </div>
                  ))}
                </div>

                {/* optional detail block */}
                {s.detail&&(
                  <div style={{padding:"6px 10px",borderRadius:7,background:"#F8F9FA",
                    border:`1px solid ${C.line}`,fontSize:10,color:C.ink2,
                    fontFamily:"ui-monospace,SFMono-Regular,monospace",
                    whiteSpace:"pre",lineHeight:1.6}}>
                    {s.detail}
                  </div>
                )}
              </div>
            </div>
          );
        })}
      </div>

      {/* ── Fields affected ── */}
      <div style={{padding:"0 18px 10px"}}>
        <div style={{padding:"8px 10px",borderRadius:8,background:"#F5F6F8",border:`1px solid ${C.line}`}}>
          <div style={{fontSize:9,fontWeight:700,color:C.ink3,textTransform:"uppercase",letterSpacing:"0.07em",marginBottom:5}}>Fields affected</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:4}}>
            {p.fields.map(f=>(
              <span key={f} style={{fontSize:10,fontWeight:700,color:C.blue,
                background:C.blueT2,padding:"2px 8px",borderRadius:5,
                fontFamily:"ui-monospace,SFMono-Regular,monospace"}}>{f}</span>
            ))}
          </div>
        </div>
      </div>

      {/* ── E&O status ── */}
      <div style={{margin:"0 18px 10px",padding:"10px 12px",borderRadius:10,
        background:p.eo.bg,border:`1px solid ${p.eo.border}`}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:5}}>
          <div style={{display:"flex",alignItems:"center",gap:6}}>
            <span style={{fontSize:12}}>{p.eo.required?"📋":"✅"}</span>
            <span style={{fontSize:9,fontWeight:700,color:p.eo.colour,
              textTransform:"uppercase",letterSpacing:"0.07em"}}>E&O Notification</span>
          </div>
          <span style={{fontSize:10,fontWeight:700,color:p.eo.colour,
            background:"rgba(255,255,255,.7)",padding:"2px 9px",borderRadius:99,
            border:`1px solid ${p.eo.border}`}}>
            {p.eo.status}
          </span>
        </div>
        <div style={{fontSize:11,color:p.eo.colour,lineHeight:1.55}}>{p.eo.note}</div>
      </div>

      {/* ── Cascade risk ── */}
      <div style={{margin:"0 18px 14px",padding:"6px 10px",borderRadius:8,
        background:"#F5F6F8",border:`1px solid ${C.line}`,
        display:"flex",alignItems:"center",gap:6}}>
        <span style={{fontSize:10}}>⛓</span>
        <span style={{fontSize:10,color:C.ink3,lineHeight:1.4}}>
          <b style={{color:C.ink2,fontWeight:600}}>Cascade risk:</b> {p.cascade}
        </span>
      </div>

      {/* ── Approve button ── */}
      <div style={{padding:"0 18px 18px"}}>
        <button onClick={onToggleApprove}
          style={{width:"100%",padding:"11px",borderRadius:10,fontWeight:700,fontSize:13,
            cursor:"pointer",letterSpacing:"0.01em",
            border:isApp?`1.5px solid ${C.green}`:`1.5px solid ${C.blue}`,
            background:isApp?"#dcfce7":C.blue,
            color:isApp?C.green:"#fff",
            boxShadow:isApp?"none":`0 2px 14px ${C.blue}44`,
            transition:"all .18s"}}>
          {isApp?"✓ Approved — click to revise":"Approve this fix →"}
        </button>
      </div>
    </div>
  );
};

// ── Macro View ────────────────────────────────────────────────────────────────
const sevCfg = {
  critical:{col:"#e14a37",bg:"#FEF2F2",label:"Critical"},
  high:    {col:"#B05D00",bg:"#FFF7ED",label:"High"},
  medium:  {col:"#44709D",bg:"#EBF2FB",label:"Medium"},
  low:     {col:"#166534",bg:"#F0FDF4",label:"Low"},
};

// detect which field keys appear in multiple clusters
const buildSharedFieldMap=()=>{
  const map={};
  MACRO_CLUSTERS.forEach(c=>{
    (c.fieldBreakdown||[]).forEach(f=>{
      if(!map[f.field]) map[f.field]=[];
      map[f.field].push(c.id);
    });
  });
  return map;
};
const SHARED_FIELD_MAP=buildSharedFieldMap();

const MacroView=({onLaunch})=>{
  const [activeRegime,setActiveRegime]=useState("All");
  const [expanded,setExpanded]=useState({});
  const [queueOrder,setQueueOrder]=useState([]);  // ordered array of ids
  const [sortBy,setSortBy]=useState("failures");

  const regimePills=["All","EU EMIR","CFTC P45","EU MiFIR"];

  const displayed = React.useMemo(()=>{
    let arr = activeRegime==="All"
      ? [...MACRO_CLUSTERS]
      : MACRO_CLUSTERS.filter(c=>c.regimes.includes(activeRegime));
    if(sortBy==="failures")   arr.sort((a,b)=>b.failures-a.failures);
    if(sortBy==="impact")     arr.sort((a,b)=>b.impactPct-a.impactPct);
    if(sortBy==="confidence") arr.sort((a,b)=>b.confidence-a.confidence);
    return arr;
  },[activeRegime,sortBy]);

  const queuedList=queueOrder.map(id=>MACRO_CLUSTERS.find(c=>c.id===id)).filter(Boolean);
  const hasQueue=queueOrder.length>0;

  const toggleExpand=id=>setExpanded(p=>({...p,[id]:!p[id]}));
  const toggleQueue=id=>setQueueOrder(prev=>
    prev.includes(id) ? prev.filter(x=>x!==id) : [...prev,id]
  );
  const moveUp=id=>setQueueOrder(prev=>{
    const i=prev.indexOf(id); if(i<=0) return prev;
    const a=[...prev]; [a[i-1],a[i]]=[a[i],a[i-1]]; return a;
  });
  const moveDown=id=>setQueueOrder(prev=>{
    const i=prev.indexOf(id); if(i<0||i>=prev.length-1) return prev;
    const a=[...prev]; [a[i],a[i+1]]=[a[i+1],a[i]]; return a;
  });

  // ── single cluster row ──────────────────────────────────────────────────────
  const ClusterRow=({c})=>{
    const sev=sevCfg[c.severity]||sevCfg.medium;
    const isOpen=!!expanded[c.id];
    const inQueue=queueOrder.includes(c.id);
    const queuePos=queueOrder.indexOf(c.id);
    const maxFailures=Math.max(...c.fieldBreakdown.map(f=>f.failures));

    // detect if any field in this cluster also appears in another cluster
    const sharedFields=c.fieldBreakdown.filter(f=>(SHARED_FIELD_MAP[f.field]||[]).length>1);
    const allSameCount=c.fieldBreakdown.length>1 &&
      c.fieldBreakdown.every(f=>f.failures===c.fieldBreakdown[0].failures);

    return(
      <div style={{
        background:"#fff",
        borderRadius:10,
        border:`1.5px solid ${inQueue?C.blue:isOpen?"#CBD5E1":C.line}`,
        boxShadow:inQueue?`0 0 0 3px ${C.blueT2}`:isOpen?"0 2px 16px rgba(0,0,0,0.06)":"none",
        transition:"border-color 150ms,box-shadow 150ms",
        overflow:"hidden",
      }}>

        {/* ── collapsed header ── */}
        <div onClick={()=>toggleExpand(c.id)} style={{
          display:"flex",alignItems:"center",gap:0,
          cursor:"pointer",userSelect:"none",
          padding:"0 14px 0 0",
          minHeight:56,
        }}>
          {/* severity stripe */}
          <div style={{
            width:4,alignSelf:"stretch",background:sev.col,flexShrink:0,
            borderRadius:"10px 0 0 10px",
          }}/>

          {/* ID */}
          <div style={{
            width:60,flexShrink:0,textAlign:"center",
            paddingLeft:14,paddingRight:6,
          }}>
            <div style={{fontSize:11,fontWeight:800,color:sev.col,fontFamily:"ui-monospace,monospace"}}>{c.id}</div>
            {c.crossRegime&&(
              <div style={{fontSize:8,fontWeight:700,color:C.blue,marginTop:2}}>↗ CROSS</div>
            )}
          </div>

          {/* title block */}
          <div style={{flex:1,minWidth:0,padding:"12px 12px 12px 6px"}}>
            <div style={{display:"flex",alignItems:"center",gap:7,marginBottom:4}}>
              <div style={{
                fontSize:13,fontWeight:700,color:C.ink,lineHeight:1.3,
                whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",
              }}>{c.title}</div>
              {c.quickWin&&(
                <span style={{
                  fontSize:8,fontWeight:800,color:"#166534",
                  background:"#DCFCE7",border:"1px solid #86EFAC",
                  padding:"1px 6px",borderRadius:3,flexShrink:0,letterSpacing:"0.03em",
                }}>QUICK WIN</span>
              )}
            </div>
            <div style={{display:"flex",alignItems:"center",gap:5,flexWrap:"wrap"}}>
              {c.regimes.map(r=>(
                <span key={r} style={{
                  fontSize:9,fontWeight:700,color:C.blue,
                  background:C.blueT2,padding:"1px 6px",borderRadius:4,
                }}>{r}</span>
              ))}
              <span style={{fontSize:9,color:C.ink3}}>·</span>
              <span style={{fontSize:10,color:C.ink3,fontWeight:500}}>
                {c.testCount} test{c.testCount!==1?"s":""} · {c.fieldsAffected} field{c.fieldsAffected!==1?"s":""}
              </span>
              <span style={{fontSize:9,color:C.ink3}}>·</span>
              <span style={{fontSize:10,color:C.ink3,fontStyle:"italic"}}>{c.fixOwner}</span>
            </div>
          </div>

          {/* key stats — compact, inline */}
          <div style={{
            display:"flex",alignItems:"center",gap:16,
            flexShrink:0,paddingRight:16,
          }}>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:16,fontWeight:800,color:sev.col,letterSpacing:"-0.02em",lineHeight:1}}>{c.failures.toLocaleString()}</div>
              <div style={{fontSize:9,color:C.ink3,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",marginTop:2}}>failures</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:16,fontWeight:800,color:C.ink,letterSpacing:"-0.02em",lineHeight:1}}>{c.impactPct}%</div>
              <div style={{fontSize:9,color:C.ink3,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",marginTop:2}}>of subs</div>
            </div>
            <div style={{textAlign:"right"}}>
              <div style={{fontSize:16,fontWeight:800,color:C.ink2,letterSpacing:"-0.02em",lineHeight:1}}>{c.confidence}%</div>
              <div style={{fontSize:9,color:C.ink3,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",marginTop:2}}>confidence</div>
            </div>
            <div style={{textAlign:"right",borderLeft:`1px solid ${C.line}`,paddingLeft:14}}>
              <div style={{fontSize:13,fontWeight:700,color:c.quickWin?"#166534":C.ink,letterSpacing:"-0.01em",lineHeight:1}}>{c.eta}</div>
              <div style={{fontSize:9,color:C.ink3,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em",marginTop:2}}>est. fix time</div>
            </div>
          </div>

          {/* queue btn */}
          <div onClick={e=>e.stopPropagation()} style={{flexShrink:0,marginRight:10,display:"flex",alignItems:"center",gap:6}}>
            {inQueue&&(
              <span style={{
                fontSize:11,fontWeight:800,color:C.blue,
                background:C.blueT2,border:`1px solid ${C.blueT}`,
                borderRadius:999,width:20,height:20,
                display:"flex",alignItems:"center",justifyContent:"center",
                flexShrink:0,
              }}>{queuePos+1}</span>
            )}
            <button onClick={()=>toggleQueue(c.id)}
              style={{
                width:28,height:28,borderRadius:6,cursor:"pointer",
                background:inQueue?C.blue:C.blueT2,
                color:inQueue?"#fff":C.blue,
                border:`1.5px solid ${inQueue?C.blue:C.blueT}`,
                fontSize:13,fontWeight:700,
                display:"flex",alignItems:"center",justifyContent:"center",
                transition:"all 120ms",
              }}>{inQueue?"✓":"+"}</button>
          </div>

          {/* chevron */}
          <div style={{
            color:C.ink3,fontSize:11,flexShrink:0,
            transform:isOpen?"rotate(180deg)":"rotate(0deg)",
            transition:"transform 180ms",
          }}>▾</div>
        </div>

        {/* ── expanded panel ── */}
        {isOpen&&(
          <div style={{borderTop:`1px solid ${C.line}`,background:"#FAFBFC"}}>

            {/* insight strip — contextual callouts */}
            {(allSameCount||c.crossRegime||sharedFields.length>0)&&(
              <div style={{
                display:"flex",gap:8,padding:"10px 20px",
                background:"#EBF2FB",borderBottom:`1px solid #BFDBFE`,
                flexWrap:"wrap",
              }}>
                {allSameCount&&(
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:12}}>⚡</span>
                    <span style={{fontSize:11,fontWeight:600,color:"#1E3A5F"}}>
                      All {c.fieldBreakdown.length} fields fail in identical submissions ({c.fieldBreakdown[0].failures.toLocaleString()}) — single upstream cause likely
                    </span>
                  </div>
                )}
                {c.crossRegime&&(
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:12}}>↗</span>
                    <span style={{fontSize:11,fontWeight:600,color:"#1E3A5F"}}>
                      Cross-regime: {c.regimes.join(" & ")} share the same root cause — one fix covers both
                    </span>
                  </div>
                )}
                {sharedFields.length>0&&(
                  <div style={{display:"flex",alignItems:"center",gap:6}}>
                    <span style={{fontSize:12}}>🔗</span>
                    <span style={{fontSize:11,fontWeight:600,color:"#1E3A5F"}}>
                      {sharedFields.length} field{sharedFields.length!==1?"s":""} also appear in other clusters — shared pipeline risk
                    </span>
                  </div>
                )}
              </div>
            )}

            <div style={{display:"flex",gap:0}}>

              {/* LEFT — field impact visualisation */}
              <div style={{flex:"0 0 55%",padding:"20px 24px",borderRight:`1px solid ${C.line}`}}>
                <div style={{fontSize:10,fontWeight:700,color:C.ink3,textTransform:"uppercase",letterSpacing:"0.09em",marginBottom:14}}>
                  Failed fields — {c.submissions.toLocaleString()} total submissions
                </div>
                <div style={{display:"flex",flexDirection:"column",gap:10}}>
                  {c.fieldBreakdown.map(f=>{
                    const barW=maxFailures>0?(f.failures/maxFailures)*100:0;
                    const isShared=(SHARED_FIELD_MAP[f.field]||[]).length>1;
                    return(
                      <div key={f.field} style={{
                        paddingBottom:12,marginBottom:4,
                        borderBottom:`1px solid ${C.line}`,
                      }}>
                        {/* field name + count */}
                        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:5}}>
                          <div style={{display:"flex",alignItems:"center",gap:6,minWidth:0,flex:1}}>
                            <span style={{fontSize:12,fontWeight:700,color:C.ink}}>{f.label}</span>
                            {isShared&&(
                              <span style={{fontSize:8,fontWeight:700,color:C.blue,background:C.blueT2,padding:"1px 5px",borderRadius:3,flexShrink:0}}>shared</span>
                            )}
                          </div>
                          <div style={{display:"flex",alignItems:"baseline",gap:5,flexShrink:0,marginLeft:8}}>
                            <span style={{fontSize:14,fontWeight:800,color:sev.col}}>{f.failures.toLocaleString()}</span>
                            <span style={{fontSize:10,color:C.ink3,fontWeight:600}}>{f.pct}%</span>
                          </div>
                        </div>

                        {/* bar */}
                        <div style={{height:5,background:C.muted,borderRadius:3,marginBottom:7}}>
                          <div style={{width:`${barW}%`,height:"100%",background:sev.col,borderRadius:3,opacity:0.85}}/>
                        </div>

                        {/* field key */}
                        <div style={{fontSize:9,color:C.ink3,fontFamily:"ui-monospace,monospace",marginBottom:7}}>{f.field}{f.rule?` · ${f.rule}`:""}</div>

                        {/* expected / actual */}
                        {(f.expected||f.actual)&&(
                          <div style={{display:"flex",flexDirection:"column",gap:4}}>
                            {f.expected&&(
                              <div style={{display:"flex",gap:6,alignItems:"flex-start"}}>
                                <span style={{
                                  fontSize:9,fontWeight:700,color:"#166534",
                                  background:"#DCFCE7",padding:"1px 6px",borderRadius:3,
                                  flexShrink:0,marginTop:1,letterSpacing:"0.02em",
                                }}>EXPECTED</span>
                                <span style={{fontSize:10,color:"#166534",lineHeight:1.5}}>{f.expected}</span>
                              </div>
                            )}
                            {f.actual&&(
                              <div style={{display:"flex",gap:6,alignItems:"flex-start"}}>
                                <span style={{
                                  fontSize:9,fontWeight:700,color:sev.col,
                                  background:sev.bg,padding:"1px 6px",borderRadius:3,
                                  flexShrink:0,marginTop:1,letterSpacing:"0.02em",
                                }}>ACTUAL</span>
                                <span style={{fontSize:10,color:sev.col,lineHeight:1.5}}>{f.actual}</span>
                              </div>
                            )}
                          </div>
                        )}
                      </div>
                    );
                  })}
                </div>

  const sendMsg=text=>{
    if(!text.trim()) return;
    const userMsg={id:"u"+Date.now(),role:"user",ts:new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"}),text:text.trim()};
    setMsgs(m=>[...m,userMsg]);
    setInput("");
    setTyping(true);
    setTimeout(()=>{
      const reply=AGENT_REPLIES[text.trim()]||"I've noted that. Let me update the plan and check the downstream impact — give me a moment to recalculate the affected records and revise E&O scope if needed.";
      setTyping(false);
      setMsgs(m=>[...m,{id:"a"+Date.now(),role:"agent",ts:new Date().toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"}),text:reply}]);
    },1200+Math.random()*600);
  };

  return(
    <div style={{flex:1,display:"flex",flexDirection:"column",minHeight:0,overflow:"hidden"}}>

      {/* ── Header ── */}
      <div style={{padding:"16px 32px",borderBottom:`1px solid ${C.line}`,flexShrink:0,
        display:"flex",alignItems:"center",justifyContent:"space-between",background:"#fff"}}>
        <div>
          <div style={{fontSize:18,fontWeight:700,color:C.ink,lineHeight:1.2}}>Remediation plan</div>
          <div style={{fontSize:12,color:C.ink3,marginTop:3}}>
            Simulation complete · 3 fix plans · 5,411 records · 2 E&O notifications pre-populated
            {approvedCount>0&&<span style={{marginLeft:8,color:C.green,fontWeight:600}}>· {approvedCount}/{PLAN_ITEMS.length} approved</span>}
          </div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <button onClick={onBack}
            style={{padding:"8px 16px",borderRadius:8,border:`1px solid ${C.line}`,
              background:"#fff",color:C.ink2,fontSize:13,fontWeight:500,cursor:"pointer"}}>
            ← Back to simulation
          </button>
          <button onClick={()=>allApproved&&onApprove()} disabled={!allApproved}
            style={{padding:"9px 22px",borderRadius:8,border:"none",
              background:allApproved?C.blue:"#C8D4E0",color:"#fff",
              fontSize:13,fontWeight:600,cursor:allApproved?"pointer":"not-allowed",
              boxShadow:allApproved?`0 2px 16px ${C.blue}55`:"none",
              transition:"all .2s"}}>
            Confirm &amp; complete →
          </button>
        </div>
      </div>

      {/* ── Body ── */}
      <div style={{flex:1,display:"flex",minHeight:0,overflow:"hidden"}}>

        {/* LEFT — detailed plan cards */}
        <div style={{flex:"0 0 520px",minWidth:0,overflowY:"auto",
          borderRight:`1px solid ${C.line}`,background:"#F7F8FA",padding:"16px"}}>

          {/* summary KPI strip */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8,marginBottom:16}}>
            {[
              {label:"Root causes",value:"3",col:C.ink},
              {label:"Records",value:"5,411",col:C.red},
              {label:"E&O filings",value:"2",col:C.amber},
              {label:"Approved",value:`${approvedCount}/3`,col:allApproved?C.green:C.blue},
            ].map((t,i)=>(
              <div key={i} style={{background:"#fff",border:`1px solid ${C.line}`,borderRadius:10,
                padding:"8px 10px",textAlign:"center"}}>
                <div style={{fontSize:18,fontWeight:800,color:t.col,lineHeight:1}}>{t.value}</div>
                <div style={{fontSize:9,fontWeight:600,color:C.ink3,marginTop:2,textTransform:"uppercase",letterSpacing:"0.05em"}}>{t.label}</div>
              </div>
            ))}
          </div>

          {PLAN_ITEMS.map(p=>(
            <PlanCard key={p.id} p={p} isApp={!!approved[p.id]}
              onToggleApprove={()=>setApproved(a=>({...a,[p.id]:!a[p.id]}))}/>

          <div style={{height:8}}/>
        </div>

        {/* RIGHT — AI chat */}

          {/* chat header */}
          <div style={{flexShrink:0,padding:"12px 24px 10px",borderBottom:`1px solid ${C.line}`,
            background:"#fff",display:"flex",alignItems:"center",gap:10}}>
            <div style={{width:30,height:30,borderRadius:10,flexShrink:0,
              background:`linear-gradient(135deg,${C.blue},#5ea0df)`,
              display:"flex",alignItems:"center",justifyContent:"center"}}>
              <AIStar size={13} colour="#fff"/>
            </div>
            <div>
              <div style={{fontSize:13,fontWeight:700,color:C.ink}}>En:ACT agent</div>
              <div style={{fontSize:10,color:C.ink3}}>Ask questions or request changes to the plan</div>
            </div>
          </div>

          {/* messages */}
          <div ref={chatRef}
            style={{flex:1,overflowY:"auto",padding:"16px 20px",display:"flex",flexDirection:"column",gap:12,background:"#FAFBFC"}}>
            {msgs.map(m=>(
              <div key={m.id} style={{display:"flex",alignItems:"flex-start",gap:10,
                flexDirection:m.role==="user"?"row-reverse":"row"}}>
                {m.role==="agent"&&(
                  <div style={{width:30,height:30,borderRadius:10,flexShrink:0,marginTop:1,
                    background:`linear-gradient(135deg,${C.blue},#5ea0df)`,
                    display:"flex",alignItems:"center",justifyContent:"center"}}>
                    <AIStar size={12} colour="#fff"/>
                  </div>
                )}
                <div style={{maxWidth:"80%",padding:"10px 14px",borderRadius:14,fontSize:12,
                  lineHeight:1.65,whiteSpace:"pre-wrap",
                  background:m.role==="user"?C.blue:"#fff",
                  color:m.role==="user"?"#fff":C.ink,
                  border:m.role==="user"?"none":`1px solid ${C.line}`,
                  borderTopLeftRadius:m.role==="agent"?4:14,
                  borderTopRightRadius:m.role==="user"?4:14,
                  boxShadow:"0 1px 4px rgba(0,0,0,.05)"}}>
                  {m.text}
                  <div style={{fontSize:9,marginTop:5,color:m.role==="user"?"rgba(255,255,255,.5)":C.ink3}}>{m.ts}</div>
                </div>
              </div>
            ))}
            {typing&&(
              <div style={{display:"flex",alignItems:"flex-start",gap:10}}>
                <div style={{width:30,height:30,borderRadius:10,flexShrink:0,
                  background:`linear-gradient(135deg,${C.blue},#5ea0df)`,
                  display:"flex",alignItems:"center",justifyContent:"center"}}>
                  <AIStar size={12} colour="#fff" spin/>
                </div>
                <div style={{padding:"12px 16px",borderRadius:14,borderTopLeftRadius:4,
                  background:"#fff",border:`1px solid ${C.line}`,
                  display:"flex",alignItems:"center",gap:5}}>
                  {[0,.2,.4].map(d=>(
                    <span key={d} style={{width:6,height:6,borderRadius:99,background:C.blue,display:"block",
                      animation:`aiPulse 1.2s ease ${d}s infinite`}}/>

              </div>
            )}
          </div>

          {/* suggestion chips */}
          <div style={{flexShrink:0,padding:"8px 20px 6px",borderTop:`1px solid ${C.line}`,
            background:"#fff",display:"flex",gap:5,flexWrap:"wrap"}}>
            {SUGGESTIONS.map(s=>(
              <button key={s} onClick={()=>sendMsg(s)}
                style={{padding:"4px 10px",borderRadius:999,fontSize:11,fontWeight:500,cursor:"pointer",
                  background:"#F5F6F8",border:`1px solid ${C.line}`,color:C.blue,
                  transition:"all .12s"}}
                onMouseEnter={e=>{e.currentTarget.style.background=C.blueT2;e.currentTarget.style.borderColor=C.blue;}}
                onMouseLeave={e=>{e.currentTarget.style.background="#F5F6F8";e.currentTarget.style.borderColor=C.line;}}>
                {s}

          </div>

          {/* input */}
          <div style={{flexShrink:0,padding:"10px 20px 16px",background:"#fff",borderTop:`1px solid ${C.line}`}}>
