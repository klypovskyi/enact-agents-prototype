              border:`1.5px solid ${C.line}`,borderRadius:12,padding:"8px 10px 8px 14px",
              background:"#FAFBFC",transition:"border-color .15s"}}
              onFocusCapture={e=>e.currentTarget.style.borderColor=C.blue}
              onBlurCapture={e=>e.currentTarget.style.borderColor=C.line}>
              <input value={input} onChange={e=>setInput(e.target.value)}
                onKeyDown={e=>e.key==="Enter"&&!e.shiftKey&&(e.preventDefault(),sendMsg(input))}
                placeholder="Ask En:ACT to adjust priorities, modify E&O thresholds, or explain a finding…"
                style={{flex:1,border:"none",background:"transparent",outline:"none",
                  fontSize:12,color:C.ink,fontFamily:"inherit"}}/>
              <button onClick={()=>sendMsg(input)} disabled={!input.trim()}
                style={{width:32,height:32,borderRadius:9,border:"none",
                  background:input.trim()?C.blue:"#E5E9EE",
                  display:"flex",alignItems:"center",justifyContent:"center",
                  cursor:input.trim()?"pointer":"default",transition:"all .15s",flexShrink:0}}>
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                  <path d="M2 7h10M8 3l4 4-4 4" stroke="#fff" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"/>
                </svg>
              </button>
            </div>
            {!allApproved&&(
              <div style={{fontSize:10,color:C.ink3,marginTop:6,textAlign:"center"}}>
                Approve all 3 fix plans to complete
              </div>
            )}
          </div>

        </div>{/* /chat */}
      </div>{/* /body */}
    </div>
  );
};

// ── Combined Remediation + Simulation screen ──────────────────────────────────
const RemSimScreen=({cascade,onApply,onBack,onCancel})=>{
  const [fixes,setFixes]=useState(INITIAL_FIXES);
  const [simming,setSimming]=useState(new Set());
  const [results,setResults]=useState({});
  const [log,setLog]=useState([]);
  const [expandedFix,setExpandedFix]=useState("FX-RC1");
  const [cascadeRCDone,setCascadeRCDone]=useState(new Set());
  const logRef=useRef(null);
  const toggleExpand=id=>setExpandedFix(id);

  useEffect(()=>{
    if(logRef.current) logRef.current.scrollTop=logRef.current.scrollHeight;
  },[log]);

  const simulate=useCallback((fix)=>{
    if(simming.has(fix.id)||results[fix.id])return;
    setSimming(s=>new Set([...s,fix.id]));
    // add placeholder entry
    setLog(prev=>[...prev,{key:fix.id,fixId:fix.id,fixTitle:fix.title,status:"simulating"}]);

    setTimeout(()=>{
      const map=cascade?SIM_RESULTS_CASCADE:SIM_RESULTS_CLEAN;
      const res=map[fix.id]||{status:"safe",ftr:90,readiness:"+5pts",detail:"No issues found."};
      setSimming(s=>{const n=new Set(s);n.delete(fix.id);return n;});

      // If this cascade fix is safe, auto-resolve the parent cascade result
      const isCascadeResolution=res.status==="safe"&&fix.isCascade;
      setResults(r=>{
        const u={...r,[fix.id]:res};
        if(isCascadeResolution){
          Object.keys(u).forEach(k=>{
            if(u[k].status==="cascade"&&u[k].cascadeFix&&u[k].cascadeFix.id===fix.id)
              u[k]={...u[k],status:"cascade-resolved"};
          });
        }
        return u;
      });
      setLog(prev=>{
        // replace simulating placeholder
        const mapped=prev.map(e=>e.fixId===fix.id&&e.status==="simulating"?{...e,...res,status:res.status}:e);
        // if resolving a cascade, flip the parent log entry too
        if(isCascadeResolution){
          return mapped.map(e=>
            e.status==="cascade"&&e.cascadeFix&&e.cascadeFix.id===fix.id
            ?{...e,status:"cascade-resolved"}:e
          );
        }
        return mapped;
      });

      // auto-add cascade fix if new cascade detected
      if(res.status==="cascade"&&res.cascadeFix){
        setFixes(f=>{
          if(f.find(x=>x.id===res.cascadeFix.id))return f;
          return[...f,res.cascadeFix];
        });
        setTimeout(()=>{
          setLog(prev=>[...prev,{key:"cascade-"+fix.id,status:"cascade-notify",cascadeFix:res.cascadeFix}]);
        },200);
      }
    },1400);
  },[simming,results,cascade]);

  const resVals=Object.values(results);
  const allSimulated=fixes.every(f=>results[f.id]);
  const hasUnresolvedCascade=resVals.some(r=>r.status==="cascade");
  const hasSafe=resVals.some(r=>r.status==="safe");
  const canApply=allSimulated&&!hasUnresolvedCascade&&hasSafe;

  const statusColour=s=>s==="safe"||s==="cascade-resolved"?C.green:s==="human"?C.amber:s==="cascade"?C.red:C.blue;
  const statusBg   =s=>s==="safe"||s==="cascade-resolved"?C.greenBg:s==="human"?C.amberBg:s==="cascade"?C.redBg:C.blueT2;
  const statusLabel=s=>s==="safe"?"✓ Safe":s==="human"?"👤 Needs human":s==="cascade"?"⚠ Cascade":s==="cascade-resolved"?"✓ Cascade resolved":"";
  const statusIcon =s=>s==="safe"||s==="cascade-resolved"?"✓":s==="human"?"👤":"⚠";

  const drawerFix=expandedFix?fixes.find(f=>f.id===expandedFix):null;
  const drawerRes=drawerFix?results[drawerFix.id]:null;
  const drawerIsSim=drawerFix?simming.has(drawerFix.id):false;
  const drawerRcDone=drawerFix?cascadeRCDone.has(drawerFix.id):false;
  const drawerCanSim=drawerFix?(!drawerFix.isCascade||drawerRcDone):false;

  const simulateAll=()=>{
    fixes.filter(f=>!results[f.id]&&!simming.has(f.id)&&(!f.isCascade||cascadeRCDone.has(f.id)))
      .forEach(f=>simulate(f));
  };
  const canSimulateAll=fixes.some(f=>!results[f.id]&&!simming.has(f.id)&&(!f.isCascade||cascadeRCDone.has(f.id)));

  return(
    <div style={{flex:1,minHeight:0,display:"flex",flexDirection:"column",overflow:"hidden",background:C.surface}}>
      {/* header */}
      <div style={{padding:"18px 32px",borderBottom:`1px solid ${C.line}`,background:"#fff",display:"flex",alignItems:"center",gap:14}}>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <Glyph a={A.rem} size={36}/>
          <span style={{fontSize:16,color:C.ink3}}>+</span>
          <div style={{width:36,height:36,borderRadius:999,background:C.green,color:"#fff",
            display:"inline-flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:15}}>S</div>
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:11,color:A.rem.colour,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em"}}>Step 2 · Intelligent Remediation</div>
          <div style={{fontSize:18,fontWeight:700,marginTop:2,letterSpacing:"-0.01em"}}>Simulate and apply fixes to your data</div>
        </div>
        <Btn variant="ghost" size="sm" onClick={onBack}>← Back to root cause review</Btn>
        <Btn variant="ghost" size="sm" onClick={onCancel}>Cancel</Btn>
      </div>

      {/* split body */}
      <div style={{flex:1,display:"flex",overflow:"hidden"}}>

        {/* LEFT: Remediation plan */}
        <div style={{flex:"0 0 440px",borderRight:`1px solid ${C.line}`,display:"flex",flexDirection:"column",background:"#fff",flexShrink:0,overflow:"hidden"}}>
          <div style={{padding:"12px 20px",borderBottom:`1px solid ${C.line}`,background:C.muted,display:"flex",alignItems:"center",gap:10}}>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:700}}>Fixes to run</div>
              <div style={{fontSize:11,color:C.ink2,marginTop:2}}>{fixes.length} proposed fixes · {fixes.reduce((s,f)=>s+f.records,0).toLocaleString()} reports to correct</div>
            </div>
            {canSimulateAll&&(
              <Btn size="sm" variant="soft" onClick={simulateAll}>Simulate all →</Btn>
            )}
          </div>

          <div style={{flex:1,minHeight:0,overflowY:"auto",padding:16,display:"flex",flexDirection:"column",gap:10}}>
            {fixes.map(fix=>{
              const res=results[fix.id];
              const isSim=simming.has(fix.id);
              const rcDone=cascadeRCDone.has(fix.id);
              const isActive=expandedFix===fix.id;
              const confVal=fix.isCascade&&rcDone?CASCADE_RC.confidence:fix.confidence;
              const stripCol=confVal>=85?C.red:confVal>=75?C.amber:C.blue;
              return(
                <div key={fix.id} className={fix.isCascade?"slideIn":undefined}
                  onClick={()=>toggleExpand(fix.id)}
                  style={{overflow:"hidden",borderRadius:10,cursor:"pointer",
                    border:`1px solid ${isActive?A.rem.colour+"99":res?statusColour(res.status)+"44":C.line}`,
                    background:"#fff",
                    outline:isActive?`2px solid ${A.rem.colour}33`:"none",outlineOffset:1,
                    transition:"border-color 140ms ease,outline 140ms ease"}}>

                  {/* severity strip */}
                  <div style={{height:3,background:res?statusColour(res.status):stripCol,borderRadius:"9px 9px 0 0"}}/>

                  <div style={{padding:"14px 16px"}}>
                    {/* top row */}
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,flexWrap:"wrap"}}>
                      <span style={{fontSize:10,color:C.ink3,fontWeight:700,letterSpacing:"0.05em"}}>{fix.id}</span>
                      {fix.isCascade&&<Pill bg={C.amberBg} fg={C.amber}>↻ Cascade</Pill>}
                      {res&&<Pill bg={statusBg(res.status)} fg={statusColour(res.status)}>{statusLabel(res.status)}</Pill>}
                      <div style={{flex:1}}/>
                      <span style={{fontSize:11,color:isActive?A.rem.colour:C.ink3,fontWeight:600,transition:"color 140ms ease"}}>
                        {isActive?"Viewing ▸":"View detail ▸"}
                      </span>
                    </div>

                    {/* main row: big count + title/desc + donut */}
                    <div style={{display:"flex",gap:16,alignItems:"flex-start"}}>
                      <div style={{flexShrink:0,textAlign:"center",width:76}}>
                        <div style={{fontSize:30,fontWeight:800,color:res?statusColour(res.status):C.ink,
                          letterSpacing:"-0.03em",lineHeight:1}}>{fix.records.toLocaleString()}</div>
                        <div style={{fontSize:9,color:C.ink3,fontWeight:600,marginTop:3,
                          textTransform:"uppercase",letterSpacing:"0.06em"}}>reports</div>
                      </div>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:13,fontWeight:700,color:C.ink,lineHeight:1.35,marginBottom:4}}>{fix.title}</div>
                        <div style={{fontSize:11,color:C.ink2,lineHeight:1.5}}>{fix.desc}</div>
                      </div>
                      <Donut value={confVal} colour={res?statusColour(res.status):A.rem.colour} size={56} label="Conf"/>
                    </div>

                    {fix.isCascade&&!rcDone&&(
                      <CascadeRCMini onDone={()=>setCascadeRCDone(s=>new Set([...s,fix.id]))}/>
                    )}
                  </div>
                </div>
              );
            })}
          </div>

          {/* apply footer */}
          <div style={{padding:"14px 16px",borderTop:`1px solid ${C.line}`,background:"#fff",display:"flex",flexDirection:"column",gap:8}}>
            <Btn variant="primary" size="md"
              style={{width:"100%",justifyContent:"center",
                ...(canApply?{animation:"glowApply 2.2s ease-in-out infinite",
                  background:`linear-gradient(90deg,${C.green},#2e7d52,${C.green})`,
                  backgroundSize:"200% 100%",
                  backgroundAnimation:"gradientMove 3s ease infinite"}:{})}}
              disabled={!canApply} onClick={onApply}>
              ✓ Apply safe fixes → Rem Plan
            </Btn>
            <div style={{fontSize:11,textAlign:"center",color:
              !resVals.length?C.ink3:hasUnresolvedCascade?C.amber:!allSimulated?C.ink3:C.green}}>
              {!resVals.length&&"Run a simulation on at least one fix to continue"}
              {resVals.length>0&&hasUnresolvedCascade&&"⚠ Fix the cascade issue before applying"}
              {resVals.length>0&&!hasUnresolvedCascade&&!allSimulated&&"Run simulations on the remaining fixes to continue"}
              {canApply&&"✓ All checks passed — safe to apply"}
            </div>
          </div>
        </div>

        {/* RIGHT: fix detail panel (always open) */}
        <div style={{flex:1,minHeight:0,display:"flex",flexDirection:"column",minWidth:0,overflow:"hidden",borderLeft:`1px solid ${C.line}`}}>
          {drawerFix?(
            <>
              {/* drawer header */}
              <div style={{padding:"20px 24px 16px",borderBottom:`1px solid ${C.line}`,background:"#fff",flexShrink:0}}>
                <div style={{display:"flex",alignItems:"flex-start",gap:14}}>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,flexWrap:"wrap"}}>
                      <Pill bg={C.muted} fg={C.ink2}>{drawerFix.id}</Pill>
                      {drawerFix.isCascade&&<Pill bg={C.amberBg} fg={C.amber}>↻ Cascade fix</Pill>}
                      {drawerRes&&<Pill bg={statusBg(drawerRes.status)} fg={statusColour(drawerRes.status)}>{statusLabel(drawerRes.status)}</Pill>}
                    </div>
                    <div style={{display:"flex",alignItems:"baseline",gap:10,marginBottom:8}}>
                      <span style={{fontSize:36,fontWeight:800,color:drawerRes?statusColour(drawerRes.status):C.ink,
                        letterSpacing:"-0.03em",lineHeight:1}}>{drawerFix.records.toLocaleString()}</span>
                      <span style={{fontSize:11,color:C.ink3,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.05em"}}>reports</span>
                    </div>
                    <div style={{fontSize:16,fontWeight:700,lineHeight:1.35,marginBottom:6}}>{drawerFix.title}</div>
                    <div style={{fontSize:13,color:C.ink2,lineHeight:1.65}}>{drawerFix.desc}</div>
                  </div>
                  <Donut value={drawerFix.isCascade&&drawerRcDone?CASCADE_RC.confidence:drawerFix.confidence}
                    colour={drawerRes?statusColour(drawerRes.status):A.rem.colour} size={72} label="Conf"/>
                </div>
              </div>

              {/* drawer body */}
              <div style={{flex:1,minHeight:0,overflowY:"auto"}}>
                <FixDrawer fix={drawerFix}
                  rcData={(!drawerFix.isCascade||drawerRcDone)?RC_MAP[drawerFix.id]:null}/>

                {/* inline simulation result */}
                {drawerIsSim&&(
                  <div style={{margin:"0 14px 14px",padding:"14px 16px",borderRadius:10,
                    background:`linear-gradient(135deg,#F4F8FF,#fff)`,
                    border:`1px solid ${C.blue}33`,
                    display:"flex",alignItems:"center",gap:12,position:"relative",overflow:"hidden"}}>
                    <div style={{position:"absolute",inset:0,pointerEvents:"none",
                      background:`linear-gradient(90deg,transparent,${C.blue}14,transparent)`,
                      animation:"shimmerSlide 1.6s ease-in-out infinite"}}/>
                    <div style={{width:40,height:40,borderRadius:999,background:C.blueT2,
                      border:`1.5px solid ${C.blue}44`,display:"flex",alignItems:"center",justifyContent:"center",
                      boxShadow:`0 0 14px ${C.blue}44`,position:"relative",flexShrink:0}}>
                      <AIStar size={18} colour={C.blue} spin/>
                    </div>
                    <div style={{position:"relative"}}>
                      <div style={{fontSize:13,fontWeight:700}}>Running simulation…</div>
                      <div style={{fontSize:11,color:C.blue,marginTop:3}}>Replaying on shadow ledger · checking downstream consumers</div>
                    </div>
                  </div>
                )}
                {drawerRes&&!drawerIsSim&&(
                  <div className="stampIn" style={{margin:"0 14px 14px",borderRadius:10,overflow:"hidden",
                    border:`1px solid ${statusColour(drawerRes.status)}55`,
                    borderLeft:`4px solid ${statusColour(drawerRes.status)}`,
                    boxShadow:`0 2px 12px ${statusColour(drawerRes.status)}18`}}>
                    <div style={{padding:"14px 16px",background:"#fff"}}>

            </div>
            <div style={{fontSize:11,textAlign:"center",color:
              (jira&&jira.id&&eoReady)?C.green:C.ink3}}>
              {!(jira&&jira.id)&&!eoReady&&"Raise a Compliance ticket and generate the E&O report to proceed"}
              {(jira&&jira.id)&&!eoReady&&"Generate the E&O report to proceed"}
              {!(jira&&jira.id)&&eoReady&&"Raise a Compliance ticket to proceed"}
              {(jira&&jira.id&&eoReady)&&"✓ Ready — all outputs complete"}
            </div>
          </div>
        </div>

        {/* RIGHT: E&O form */}
        <div style={{flex:1,minHeight:0,minWidth:0,display:"flex",flexDirection:"column",overflow:"hidden"}}>

          {/* E&O header */}
          <div style={{flexShrink:0,padding:"16px 24px",borderBottom:`1px solid ${C.line}`,
            background:eoReady?"linear-gradient(135deg,#EAF3FB,#fff)":"#fff",
            display:"flex",alignItems:"center",gap:14,
            transition:"background 300ms ease"}}>
            <div style={{width:42,height:42,borderRadius:10,flexShrink:0,
              background:"linear-gradient(135deg,#003078,#005EB8)",color:"#fff",
              display:"flex",alignItems:"center",justifyContent:"center",
              fontSize:13,fontWeight:800,letterSpacing:"-0.02em"}}>FCA</div>
            <div style={{flex:1}}>
              <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                <span style={{fontSize:14,fontWeight:700}}>Transaction Reporting — Errors &amp; Omissions Notification</span>
                {eoReady&&<Pill bg={C.blue} fg="#fff" style={{fontSize:9}}>✦ Pre-filled by En>ACT agents</Pill>}
              </div>
              <div style={{fontSize:11,color:C.ink2,marginTop:2}}>FCA MRT · mrt@fca.org.uk · Commission Delegated Regulation (EU) 2017/590</div>
            </div>
            {!eoReady&&!eoGenerating&&(
              <Btn variant="primary" size="md" onClick={generateEo}>
                <AIStar size={11} colour="#fff"/>Generate E&amp;O →
              </Btn>
            )}
            {eoGenerating&&(
              <div style={{display:"flex",alignItems:"center",gap:8,fontSize:12,color:C.blue,fontWeight:600}}>
                <AIStar size={15} colour={C.blue} spin/>Generating…
              </div>
            )}
            {eoReady&&(
              <Btn variant="ghost" size="sm" onClick={()=>setEoOpen(v=>!v)}>
                {eoOpen?"Collapse ▲":"Expand ▼"}
              </Btn>
            )}
          </div>

          {/* generating shimmer */}
          {eoGenerating&&(
            <div style={{padding:"28px 24px",display:"flex",flexDirection:"column",gap:14,alignItems:"center"}}>
              <div style={{width:"100%",height:7,background:C.line,borderRadius:999,overflow:"hidden",position:"relative"}}>
                <div style={{position:"absolute",inset:0,
                  background:`linear-gradient(90deg,${C.blue},${C.blueT2},${C.blue})`,
                  backgroundSize:"200% 100%",animation:"shimmerSlide .9s ease infinite"}}/>
              </div>
              <div style={{fontSize:12,color:C.ink2,display:"flex",alignItems:"center",gap:8}}>
                <AIStar size={13} colour={C.blue} spin/>
                Pre-filling sections 2.2–2.7 from Root Cause · sections 3.2–3.3 from Simulation…
              </div>
            </div>
          )}

          {/* empty state */}
          {!eoReady&&!eoGenerating&&(
            <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16,padding:40,color:C.ink3}}>
              <div style={{width:64,height:64,borderRadius:999,background:C.muted,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28}}>📋</div>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:15,fontWeight:600,color:C.ink2,marginBottom:6}}>E&amp;O notification ready to generate</div>
                <div style={{fontSize:12,lineHeight:1.6,maxWidth:320}}>
                  Click <b>Generate E&amp;O →</b> to pre-fill sections 2.2–2.7 from Root Cause findings
                  and sections 3.2–3.3 from Simulation results.
                </div>
              </div>
            </div>
          )}

          {/* E&O form body */}
          {eoReady&&eoOpen&&(
            <>
              <div className="slideIn" style={{flex:1,minHeight:0,overflowY:"auto",padding:"20px 24px",display:"flex",flexDirection:"column",gap:10}}>

                <EoSection num="1" title="General Details">
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                    <EoField label="1.0 Date" value="13 May 2026" agent/>
                    <EoField label="1.1 Executing entity" value="Whale Capital" agent/>
                    <EoField label="1.2 LEI" value="WHLCPT00MOCK00000120" agent/>
                    <EoField label="1.3 Type of firm" value="Electronic Money Institution / PSP" agent/>
                    <EoField label="1.4 Submitting ARM" value="DFR Reporting Platform" agent/>
                    <EoField label="1.5 Contact name &amp; title" required hint="Enter contact name and job title"/>
                    <EoField label="1.6 Contact email" required hint="Enter email address"/>
                    <EoField label="1.7 Contact telephone" required hint="Enter telephone number"/>
                  </div>
                </EoSection>

                <EoSection num="2" title="Details of Errors or Omissions" open>
                  <EoField label="2.1 Relevant regulation" agent
                    value="Commission Delegated Regulation (EU) 2017/590, Article 15(2) — MiFID II transaction reporting; CFTC Part 45 swap data reporting"/>
                  <EoField label="2.2 Details of issue and scope" agent
                    value="3 structural data errors across FX Swap/Forward records affecting 5,411 reports via DFR_Reporting_RAW_Feed: (1) CP2 LEI lookup failure — broker_lei_ref_dict missing 3 counterparties onboarded post 14 Jan 2026, 415 records, field 1_14_counterparty_2; (2) CP2 financial entity indicator mismatch — intragroup_flag absent from 1_17 derivation logic, 184 records; (3) Notional precision loss — Original_TargetAmount at 2dp with no expansion step, 4,812 records, field 1_31_notional_amt_leg_1."/>
                  <EoField label="2.3 Field(s) with error / omission" agent
                    value="1_14_counterparty_2 (415) · 1_17_counterparty_2_financial_entity_indicator (184) · 1_31_notional_amt_leg_1 (4,812). Secondary: 1_15_counterparty_2_identifier_source (89) and 1_31_notional_amt_leg_2 (assessment pending)."/>
                  <EoField label="2.4 Root cause" agent
                    value="(1) broker_lei_ref_dict not updated post 3 new onboardings after 14 Jan 2026 — CLIENT_ID → PartyFile.TradePartyValue lookup failing. (2) 1_17 derivation references TradePartyValue LEI only; intragroup_flag not consulted — confirmed absent in lineage mapping. (3) DFR Formatting step maps Original_TargetAmount 1-1 to 1_31 with no precision expansion — 2dp transmitted where 6dp required."/>
                  <EoField label="2.5 How discovered" agent
                    value="Detected by En:ACT Root Cause Analysis Agent on 09 May 2026 via lineage analysis. Validated by DFR lineage mapping audit and reviewed by the reporting team."/>
                  <EoField label="2.6 Period for which issue occurred" agent
                    value="Issues 1 &amp; 2: estimated onset 14 Jan 2026 (last dict refresh); detected 09 May 2026. Issue 3: onset under review — pipeline unchanged for extended period; back-reporting window TBC pending Compliance sign-off."/>
                  <EoField label="2.7 Total reports impacted" agent
                    value="5,411 confirmed (415 + 184 + 4,812). 691 remediated and safe to back-report (FX-RC1 + FX-RC2 + FX-RC4, avg FTR 93%). 4,812 (FX-RC3) pending Compliance review."/>
                </EoSection>

                <EoSection num="3" title="Remediation &amp; Back-Reporting" open>
                  <EoField label="3.1 Oversight responsibility" required hint="Name the individual or committee with oversight"/>
                  <EoField label="3.2 Actions taken to remediate" agent
                    value="3 remediation plans prepared by En:ACT and reviewed by the reporting team: (1) broker_lei_ref_dict update — 415 records to be re-derived and back-reported, pending ref data team action; (2) intragroup_flag → 1_17 derivation rule addition — 184 records, pending ops re-processing; (3) DFR recon feed key rebuild for 92 cascade records, pending ops confirmation. Outstanding: FX-RC3 precision fix pending Compliance sign-off (312-record valuation tolerance risk). Assessment of 1_31_notional_amt_leg_2 outstanding."/>
                  <EoField label="3.3 Total transactions to back-report" agent
                    value="691 back-reported (readiness 97.3%). 4,812 pending Compliance sign-off (FX-RC3, est. 10 business days from approval)."/>
                  <EoField label="3.4 Systems &amp; controls weaknesses" required hint="Detail weaknesses identified"/>
                  <EoField label="3.5 Plans to address weaknesses" required hint="Detail remediation plans for control gaps"/>
                </EoSection>

                <EoSection num="4" title="On-Going Monitoring &amp; Governance">
                  <EoField label="4.1 Planned audit / compliance monitoring" required hint="Detail planned reviews and scope"/>
                  <EoField label="4.4 Last reconciliation summary" agent
                    value="Reconciliation rate: 89.5% (↓1.9%). 10,584 breaks. 7,456 open issues across 3 clusters. En>ACT monitoring active — next refresh 16 May 2026."/>
                </EoSection>

              </div>

              {/* sticky footer — always visible */}
              <div style={{flexShrink:0,padding:"12px 24px",borderTop:`1px solid ${C.line}`,background:"#fff",
                display:"flex",alignItems:"center",gap:10}}>
                {!jira?(
                  <div style={{fontSize:11,color:C.amber,display:"flex",alignItems:"center",gap:6,flex:1,minWidth:0}}>
                    <span style={{flexShrink:0}}>⚠</span>
                    <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>Raise Jira ticket for FX-RC3 Compliance review before submitting</span>
                  </div>
                ):(
                  <div style={{fontSize:11,color:C.green,display:"flex",alignItems:"center",gap:6,flex:1}}>
                    <span>✓</span><span>Compliance ticket raised — ready to submit</span>
                  </div>
                )}
                <div style={{display:"flex",gap:8,flexShrink:0}}>
                  <Btn variant="default" size="md">↓ Download PDF draft</Btn>
                </div>
              </div>
            </>
          )}

          {/* E&O ready but collapsed */}
          {eoReady&&!eoOpen&&(
            <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:12,padding:40}}>
              <div style={{width:56,height:56,borderRadius:999,background:C.blueT2,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26}}>✦</div>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:14,fontWeight:700,color:C.blue}}>E&amp;O form pre-filled</div>
                <div style={{fontSize:12,color:C.ink2,marginTop:4}}>7 sections · 14 agent-generated fields · 5 required fields</div>
              </div>
              <Btn variant="primary" size="md" onClick={()=>setEoOpen(true)}>Review &amp; submit →</Btn>
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

// ── Tweaks panel ──────────────────────────────────────────────────────────────
const TweaksPanel=({cascadeOn,setCascade})=>{
  const [open,setOpen]=useState(false);
  return(
    <>
      <button onClick={()=>setOpen(o=>!o)}
        style={{position:"fixed",right:16,bottom:16,zIndex:9999,
          width:40,height:40,borderRadius:999,border:`1.5px solid ${C.blue}`,
          background:open?C.blue:"#fff",color:open?"#fff":C.blue,
          cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",
          boxShadow:"0 4px 12px rgba(0,0,0,0.12)",transition:"all 140ms ease"}}>⚙</button>
      {open&&(
        <div className="twk-panel">
          <div className="twk-hd"><b>Tweaks</b><button className="twk-x" onClick={()=>setOpen(false)}>✕</button></div>
          <div className="twk-body">
            <div className="twk-sect">Simulation behaviour</div>
            <div className="twk-sub">Controls what happens when FX-RC2 is simulated.</div>
            <div className="twk-row-h">
              <span className="twk-lbl">Cascade mode</span>
              <button type="button" className="twk-toggle" data-on={cascadeOn?"1":"0"}
                onClick={()=>setCascade(v=>!v)}><i/></button>
            </div>
            <div className="twk-hint">On: FX-RC2 simulation triggers a downstream cascade — a new fix is auto-added to the plan. Off: all three fixes simulate cleanly.</div>
          </div>
        </div>
      )}
    </>
  );
};

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const [stage,   setStage   ]=useState("macro");
  const [cascade, setCascade ]=useState(true);

  const runRootCause=()=>{
    setStage("running:root");
    setTimeout(()=>setStage("review:root"), A.root.duration);
  };

  // active sidebar item per stage
  const sidebarActive=stage=>{
    if(stage==="macro")                         return "Issue map";
    if(stage==="running:root"||stage==="review:root") return "Root Cause";
    if(stage==="remediation")                   return "Simulation";
    if(stage==="plan")                          return "Rem Plan";
    if(stage==="done")                          return "Rem Plan";
    return "Issue map";
  };
  const active=sidebarActive(stage);

  const navItems=[
    {section:null,    items:[{label:"Issue map",icon:"⬡"},{label:"Accuracy",icon:"◎"},{label:"Completeness",icon:"◑"},{label:"Timeliness",icon:"◷"},{label:"Benchmarking",icon:"↗"}]},
    {section:"Re:ACT",items:[{label:"Root Cause",icon:"⌥"},{label:"Simulation",icon:"▷"},{label:"Rem Plan",icon:"✦"}]},
  ];

  const sidebar=(
    <div style={{width:200,background:C.navy,color:"#fff",padding:"22px 0 16px",display:"flex",flexDirection:"column",gap:0,flexShrink:0}}>
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"0 16px 18px",borderBottom:"1px solid #ffffff18",marginBottom:10}}>
        <AIStar size={16} colour="#fff"/>
        <span style={{fontSize:14,fontWeight:700}}>En&gt;ACT</span>
      </div>
      {navItems.map(({section,items})=>(
        <div key={section||"main"}>
          {section&&(
            <div style={{fontSize:9,color:"#ffffff50",textTransform:"uppercase",letterSpacing:"0.1em",padding:"14px 16px 6px"}}>{section}</div>
          )}
          {items.map(({label,icon})=>{
            const isActive=label===active;
            const isDone=(label==="Root Cause"&&["remediation","plan","done"].includes(stage))||
                         (label==="Simulation"&&["plan","done"].includes(stage));
            return(
              <div key={label} style={{
                display:"flex",alignItems:"center",gap:9,
                padding:"8px 16px",cursor:"pointer",
                background:isActive?"#ffffff18":"transparent",
                borderLeft:isActive?`3px solid ${C.blue}`:"3px solid transparent",
                transition:"background 120ms",
              }}>
                <span style={{fontSize:12,opacity:0.7,width:14,textAlign:"center"}}>{isDone?"✓":icon}</span>
                <span style={{fontSize:12,fontWeight:isActive?700:400,color:isActive?"#fff":isDone?"#ffffffa0":"#ffffffb0"}}>{label}</span>
                {isActive&&stage.startsWith("running")&&(
                  <span style={{marginLeft:"auto",width:6,height:6,borderRadius:999,background:C.blue,animation:"aiPulse 1.4s ease-in-out infinite"}}/>
                )}
              </div>
            );
          })}
        </div>
      ))}
      <div style={{flex:1}}/>
      <div style={{display:"flex",alignItems:"center",gap:10,padding:10,margin:"0 12px",border:"1px solid #ffffff18",borderRadius:8}}>
        <div style={{width:26,height:26,borderRadius:999,background:"#5EA0DF",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700}}>SC</div>
        <div>
          <div style={{fontSize:12,fontWeight:600}}>Sarah Chen</div>
          <div style={{fontSize:10,opacity:.5}}>Whale Capital</div>
        </div>
      </div>
    </div>
  );

  // tracker only shown after macro
  const showTracker=stage!=="macro";

  return(
    <div style={{width:"100%",height:"100vh",display:"flex",overflow:"hidden",background:C.surface}}>
      <TweaksPanel cascadeOn={cascade} setCascade={setCascade}/>
      {sidebar}
      <div style={{flex:1,display:"flex",flexDirection:"column",minWidth:0,minHeight:0,overflow:"hidden",position:"relative"}}>
        {showTracker&&(
          <div style={{padding:"14px 36px 0",display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
            <Tracker stage={stage}/>
          </div>
        )}
        {stage==="macro"       &&<MacroView onLaunch={runRootCause}/>}
        {stage==="running:root"&&<AgentRunning agent={A.root}/>}
        {stage==="review:root" &&<ReviewRoot onNext={()=>setStage("remediation")} onCancel={()=>setStage("macro")}/>}
        {stage==="remediation" &&<RemSimScreen cascade={cascade} onApply={()=>setStage("plan")} onBack={()=>setStage("review:root")} onCancel={()=>setStage("macro")}/>}
        {stage==="plan"        &&<RemPlanScreen onApprove={()=>setStage("done")} onBack={()=>setStage("remediation")} onCancel={()=>setStage("macro")}/>}
        {stage==="done"        &&<DoneScreen onRestart={()=>setStage("macro")}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
