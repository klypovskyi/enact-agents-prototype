<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8"/>
<title>AI Agents Flow — En>ACT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
html,body{height:100%;margin:0;}
body{font-family:'Inter',system-ui,sans-serif;background:#FAFAFB;color:#212121;-webkit-font-smoothing:antialiased;}
button{font-family:inherit;}
@keyframes aiSpin {from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes aiPulse{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.08);opacity:.85;}}
@keyframes fadeIn {from{opacity:0;transform:translateY(4px);}to{opacity:1;transform:none;}}
@keyframes slideIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
@keyframes slideInRight{from{opacity:0;transform:translateX(32px);}to{opacity:1;transform:none;}}
/* ── New wow animations ─────────────────────────────────────────────────── */
@keyframes dataFlow{from{stroke-dashoffset:60;}to{stroke-dashoffset:0;}}
@keyframes neuralPulse{0%,100%{opacity:.18;}50%{opacity:.85;}}
@keyframes orbitCCW{from{transform:rotate(0deg);}to{transform:rotate(-360deg);}}
@keyframes shimmerSlide{0%{transform:translateX(-100%);}100%{transform:translateX(300%);}}
@keyframes particleFloat{0%{opacity:0;transform:translate(0,0) scale(0);}18%{opacity:.95;}80%{opacity:.3;}100%{opacity:0;transform:translate(var(--ptx),var(--pty)) scale(.1);}}
@keyframes rippleOut{0%{transform:scale(1);opacity:.55;}100%{transform:scale(3.2);opacity:0;}}
@keyframes gridDrift{0%{background-position:0 0;}100%{background-position:40px 40px;}}
@keyframes glowApply{0%,100%{box-shadow:0 2px 8px rgba(35,100,67,.25),0 0 0 0 rgba(35,100,67,0);}50%{box-shadow:0 6px 24px rgba(35,100,67,.4),0 0 0 6px rgba(35,100,67,.14);}}
@keyframes stampIn{0%{transform:scale(1.18);opacity:0;}55%{transform:scale(.97);}100%{transform:scale(1);opacity:1;}}
@keyframes scanPulse{0%,100%{opacity:0;}40%,60%{opacity:1;}}
@keyframes nodeConnect{0%{stroke-dashoffset:80;opacity:0;}100%{stroke-dashoffset:0;opacity:1;}}
@keyframes tileGlow{0%,100%{box-shadow:none;}50%{box-shadow:0 0 0 3px rgba(68,112,173,.2),0 4px 20px rgba(68,112,173,.15);}}
.fadeIn{animation:fadeIn 220ms ease both;}
.slideIn{animation:slideIn 260ms cubic-bezier(.2,.6,.2,1) both;}
.slideInRight{animation:slideInRight 220ms cubic-bezier(.2,.6,.2,1) both;}
.stampIn{animation:stampIn 320ms cubic-bezier(.2,.6,.2,1) both;}
.glowApply{animation:glowApply 2.2s ease-in-out infinite;}

/* ── Tweaks panel ── */
.twk-panel{position:fixed;right:16px;bottom:68px;z-index:9998;width:280px;
  background:rgba(250,249,247,.96);color:#29261b;
  -webkit-backdrop-filter:blur(24px);backdrop-filter:blur(24px);
  border:.5px solid rgba(255,255,255,.6);border-radius:14px;
  box-shadow:0 12px 40px rgba(0,0,0,.18);
  font:11.5px/1.4 'Inter',system-ui,sans-serif;overflow:hidden;}
.twk-hd{display:flex;align-items:center;justify-content:space-between;padding:10px 8px 10px 14px;}
.twk-hd b{font-size:12px;font-weight:600;}
.twk-x{appearance:none;border:0;background:transparent;color:rgba(41,38,27,.55);
  width:22px;height:22px;border-radius:6px;cursor:pointer;font-size:13px;}
.twk-x:hover{background:rgba(0,0,0,.06);color:#29261b;}
.twk-body{padding:4px 14px 14px;display:flex;flex-direction:column;gap:8px;}
.twk-sect{font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:rgba(41,38,27,.45);padding-top:8px;}
.twk-sub{font-size:10px;color:rgba(41,38,27,.5);line-height:1.4;}
.twk-row-h{display:flex;flex-direction:row;align-items:center;justify-content:space-between;gap:10px;margin-top:6px;}
.twk-lbl{font-size:11.5px;font-weight:500;color:rgba(41,38,27,.72);}
.twk-hint{font-size:10px;color:rgba(41,38,27,.45);line-height:1.4;margin-top:4px;}
.twk-toggle{position:relative;width:32px;height:18px;border:0;border-radius:999px;
  background:rgba(0,0,0,.15);transition:background .15s;cursor:pointer;padding:0;flex-shrink:0;}
.twk-toggle[data-on="1"]{background:#34c759;}
.twk-toggle i{position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;
  background:#fff;box-shadow:0 1px 2px rgba(0,0,0,.25);transition:transform .15s;font-style:normal;display:block;}
.twk-toggle[data-on="1"] i{transform:translateX(14px);}
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>

<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef, useCallback } = React;

// ── Tokens ───────────────────────────────────────────────────────────────────
const C = {
  ink:"#212121", ink2:"#5d6168", ink3:"#9aa0a6",
  muted:"#F5F6F8", surface:"#FAFAFB",
  line:"#E5E7EB", line2:"#CFD3D8",
  blue:"#44709D", blueH:"#37538C", blueT:"#C4E1F6", blueT2:"#EAF3FB",
  red:"#B23220", redBg:"#FECFD2", redT:"#FDECEC",
  amber:"#B05D00", amberBg:"#F7E7CB", amberT:"#FBF4E5",
  green:"#236443", greenBg:"#D9EFE2", greenT:"#EEF7F1",
  navy:"#263038",
  sans:"'Inter',system-ui,sans-serif",
};

// ── Agents (2-step flow) ─────────────────────────────────────────────────────
const AGENTS = [
  { id:"root", name:"Autonomous Root Cause", short:"Root Cause", glyph:"R", colour:"#44709D",
    tagline:"Automatically diagnoses reporting failures across fields, asset classes, counterparties and time periods — so you understand exactly what went wrong before you fix it.", duration:2600 },
  { id:"rem",  name:"Intelligent Remediation", short:"Rem & Sim", glyph:"F", colour:"#B05D00",
    tagline:"Generates a prioritised remediation plan, groups issues by root cause, simulates each fix against your data, and pre-populates your E&O notification — ready for Compliance sign-off.", duration:1800 },
];
const A = Object.fromEntries(AGENTS.map(a => [a.id, a]));

// ── Entity & regime ───────────────────────────────────────────────────────────
const ENTITY = { name:"Whale Capital", lei:"6PTKHDJ8HDUF78PFWH30", type:"Electronic Money Institution", regime:"MiFID II / CFTC P45", arm:"DFR Reporting Platform" };

// ── Root cause data (DFR lineage — Whale Capital) ────────────────────────────────
const ROOT_CAUSES = [
  { id:"RC1", sev:"high", confidence:89,
    title:"Counterparty IDs can't be found for 3 trading partners",
    summary:"415 trade reports are failing because the LEI lookup table hasn't been updated since 3 new counterparties were onboarded in January. The system can't match them to a valid ID.",
    cluster:"Counterparty 2 LEI lookup failure — FX Swap/Forward",
    entity:"Whale Capital", records:415,
    assetClass:"FX Swap / Forward", regime:"CFTC P45 / MiFID II RTS22",
    fieldRef:"1_14_counterparty_2", fieldLabel:"Counterparty 2 Identifier",
    transformType:"Lookup (Client ID → Legal Entity Identifier)",
    counterparties:["Alderton Capital International","Castleford Bank Plc","Meridian Securities & Co"],
    breakdown:[{label:"ID not found in lookup table",n:287},{label:"Outdated ID returned",n:96},{label:"Field left blank",n:32}],
    dailyBreaks:[58,63,61,57,71,55,48],
    period:"14 Jan 2026 – 09 May 2026",
    chain:["Trade Feed (DFR)","Client ID lookup","LEI Reference Table","Counterparty 2 ID field","TRACC Repository"], breakAt:2,
    proposed:"Add the 3 missing counterparties to the LEI reference table, then re-generate the Counterparty 2 ID field for all 415 affected records and resubmit.",
    fix:"Update LEI reference table · Re-derive Counterparty 2 ID · Resubmit 415 records",
    evidence:[
      "89% of failures trace to the same 3 entries missing from the LEI reference table",
      "Table last updated 14 Jan 2026 — 3 counterparties onboarded since then with no table refresh",
      "The trade ID lookup chain itself is working correctly — failure is only at the final table lookup step",
      "287 records: no match found; 96 records: stale pre-merger ID returned; 32 records: field written blank",
      "Low cascade risk: collateral reports use a separate lookup pipeline, unaffected",
    ]},
  { id:"RC2", sev:"high", confidence:78,
    title:"Intragroup trades are misclassified — entity type flag ignored",
    summary:"184 reports have the wrong counterparty classification because the system's derivation logic doesn't check whether a trade is intragroup. For these trades, the financial entity indicator should be set to TRUE but isn't.",
    cluster:"Counterparty 2 financial entity indicator mismatch — intragroup trades",
    entity:"Whale Capital", records:184,
    assetClass:"FX Swap / Forward", regime:"CFTC P45 / MiFID II RTS22",
    fieldRef:"1_17_counterparty_2_financial_entity_indicator", fieldLabel:"CP2 Financial Entity Indicator",
    transformType:"Derived field (conditional rule — intragroup flag not consulted)",
    counterparties:["Hartwell Lynch International","Pemberton Chase Bank N.A."],
    breakdown:[{label:"Indicator blank — should be TRUE",n:141},{label:"Indicator FALSE — should be TRUE",n:43}],
    dailyBreaks:[22,31,18,29,25,34,25],
    period:"14 Jan 2026 – 09 May 2026",
    chain:["Trade Feed (DFR)","Intragroup flag + Counterparty value","Classification rule","Financial Entity Indicator field","TRACC Repository"], breakAt:2,
    proposed:"Add a rule to the derivation logic: if a trade is flagged as intragroup, set the Financial Entity Indicator to TRUE. Apply retroactively to 184 records for Hartwell Lynch International and Pemberton Chase Bank N.A.",
    fix:"Add intragroup derivation rule · Correct 184 records · Resubmit",
    evidence:[
      "78% of classification errors occur on trades already marked as intragroup in the source data",
      "The derivation rule doesn't reference the intragroup flag at all — confirmed missing from the rule specification",
      "The intragroup flag is present on every affected source row and accessible — just not being checked",
      "141 records: indicator blank where TRUE required; 43 records: indicator set to FALSE instead of TRUE",
      "Medium cascade risk: counterparty reconciliation scores for Hartwell Lynch affected — resolved once fix applied",
    ]},
  { id:"RC3", sev:"medium", confidence:74,
    title:"Notional amounts are being rounded — precision too low for submission",
    summary:"4,812 reports contain notional amounts rounded to 2 decimal places. Regulators require 6 decimal places. The formatting pipeline passes the value straight through without expanding the precision.",
    cluster:"Notional amount precision drift — leg 1 (FX Swap/Forward)",
    entity:"Whale Capital", records:4812,
    assetClass:"FX Swap / Forward", regime:"CFTC P45 / MiFID II RTS22",
    fieldRef:"1_31_notional_amt_leg_1", fieldLabel:"Notional Amount — Leg 1",
    transformType:"Formatting (direct mapping, no precision conversion applied)",
    counterparties:["VBK AG","Castleford Bank Plc","Alderton Capital International","Rheinfeld Bank AG"],
    breakdown:[{label:"Notional rounded to 2 decimal places",n:4812}],
    dailyBreaks:[690,701,688,712,695,714,612],
    period:"Estimated onset Q4 2025 — ongoing; detected 09 May 2026",
    chain:["Trade Feed (DFR)","Notional amount (2dp)","Format step — no precision expand","Notional Amount Leg 1 field","TRACC Repository"], breakAt:2,
    proposed:"Add a precision conversion step in the formatting pipeline: expand the notional amount from 2dp to 6dp before submission. Apply to all FX Swap/Forward records. Also check Leg 2 notional — it uses the same pipeline and likely has the same issue.",
    fix:"Add 6dp precision step · Fix 4,812 records · Check Leg 2 separately",
    evidence:[
      "Every single precision failure follows the same 2dp rounding pattern — all trace to the same source field",
      "The formatting pipeline maps the value directly with no conversion step — confirmed in the pipeline spec",
      "TRACC rejects submissions where notional precision is below 6dp",
      "The Leg 2 notional uses the same pipeline — likely affected by the same defect",
      "Low–medium cascade risk: valuation tolerance breach possible on 312 records against counterparty submissions",
    ]},
];

// ── Remediation fixes ────────────────────────────────────────────────────────
const INITIAL_FIXES = [
  { id:"FX-RC1", rcId:"RC1", title:"Fix counterparty ID lookup table",
    records:415, confidence:89, entity:"Whale Capital", field:"Counterparty 2 Identifier",
    desc:"Add 3 missing counterparties to the LEI reference table and re-generate the Counterparty 2 ID for all 415 affected FX trade reports." },
  { id:"FX-RC2", rcId:"RC2", title:"Fix intragroup trade classification",
    records:184, confidence:78, entity:"Whale Capital", field:"CP2 Financial Entity Indicator",
    desc:"Add a derivation rule so intragroup trades correctly set the Financial Entity Indicator to TRUE. Retroactively correct 184 FX trade reports." },
  { id:"FX-RC3", rcId:"RC3", title:"Fix notional amount precision",
    records:4812, confidence:74, entity:"Whale Capital", field:"Notional Amount — Leg 1",
    desc:"Add a precision conversion step so notional amounts are expanded to 6 decimal places before submission. Applies to 4,812 FX trade reports. Leg 2 should be assessed separately." },
];

// cascade fix auto-added when FX-RC2 simulation detects downstream break
const CASCADE_FIX = {
  id:"FX-RC4", rcId:"RC4", isCascade:true,
  title:"Rebuild reconciliation feed key",
  records:92, confidence:81, entity:"Whale Capital", field:"Counterparty recon feed key",
  desc:"Rebuilds the counterparty reconciliation feed key after the classification fix. Affects 92 records where the key now mismatches.",
};

// root cause for cascade fix — found by mini RC agent
const CASCADE_RC = {
  id:"RC4", confidence:83, sev:"high",
  title:"Reconciliation feed key not rebuilt after classification change",
  cluster:"Downstream cascade from intragroup classification fix",
  entity:"Whale Capital", records:92,
  chain:["Financial Entity Indicator field","Recon key builder","Recon feed key","TRACC Repository"], breakAt:1,
  proposed:"Rebuild the counterparty reconciliation feed key for 92 affected records after the classification change.",
  evidence:[
    "The reconciliation feed key includes the Financial Entity Indicator as one of its components",
    "Changing the indicator from FALSE to TRUE causes a key mismatch on 92 of the 184 corrected records",
    "The key-builder doesn't automatically re-run after the indicator changes — it needs to be triggered manually",
  ],
};

// ── Simulation results ────────────────────────────────────────────────────────
const SIM_RESULTS_CASCADE = {
  "FX-RC1":{ status:"safe", ftr:96, readiness:"+6pts",
    detail:"415 records corrected · Counterparty IDs re-generated and validated · Safe to back-report.",
    note:"Note: the identifier source field was also re-evaluated for 89 records — confirm source codes look correct before submitting." },
  "FX-RC2":{ status:"cascade", ftr:91, readiness:"—",
    detail:"184 records corrected · but this change broke something downstream. The counterparty reconciliation feed key no longer matches for 92 records — this needs to be fixed first.",
    cascadeChain:["Trade Feed (DFR)","Intragroup flag","Classification rule","Recon feed key","TRACC"],
    cascadeFix: CASCADE_FIX },
  "FX-RC3":{ status:"human", ftr:88, readiness:"+3pts",
    detail:"4,812 records affected · Needs a human decision before proceeding.",
    reason:"Changing the notional precision may cause a valuation mismatch against what 312 counterparties submitted. Someone needs to review this before resubmitting. Also — the Leg 2 notional uses the same pipeline and likely has the same problem." },
  "FX-RC4":{ status:"safe", ftr:81, readiness:"+2pts",
    detail:"92 records fixed · Reconciliation feed key rebuilt and re-synced · Cascade from the classification fix fully resolved." },
};
const SIM_RESULTS_CLEAN = {
  "FX-RC1":{ status:"safe", ftr:96, readiness:"+6pts",
    detail:"415 records corrected · Counterparty IDs re-generated · 96% first-time-right · Safe to back-report." },
  "FX-RC2":{ status:"safe", ftr:91, readiness:"+3pts",
    detail:"184 records corrected · Classification updated · Reconciliation feed unaffected · Safe to back-report." },
  "FX-RC3":{ status:"human", ftr:88, readiness:"+3pts",
    detail:"4,812 records affected · Needs a human decision before proceeding.",
    reason:"Changing the notional precision may cause a valuation mismatch on 312 records against counterparty submissions. Compliance sign-off is required before resubmitting." },
};

// ── Primitives ────────────────────────────────────────────────────────────────
const Btn = ({children,variant="default",size="md",onClick,disabled,style})=>{
  const sz={sm:{h:30,px:12,fs:12},md:{h:38,px:16,fs:13},lg:{h:46,px:22,fs:14}}[size];
  const V={
    primary:{bg:C.blue,fg:"#fff",bd:C.blue,hbg:C.blueH},
    danger: {bg:C.red, fg:"#fff",bd:C.red, hbg:"#8e2818"},
    ghost:  {bg:"transparent",fg:C.ink,bd:"transparent",hbg:C.muted},
    soft:   {bg:C.blueT2,fg:C.blue,bd:C.blueT,hbg:C.blueT},
    default:{bg:"#fff",fg:C.ink,bd:C.line2,hbg:C.muted},
  }[variant];
  const [h,setH]=useState(false);
  return(
    <button onClick={disabled?undefined:onClick} disabled={disabled}
      onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
      style={{display:"inline-flex",alignItems:"center",justifyContent:"center",gap:8,
        height:sz.h,padding:`0 ${sz.px}px`,
        background:h&&!disabled?V.hbg:V.bg,color:V.fg,
        border:`1px solid ${V.bd}`,borderRadius:8,
        fontFamily:C.sans,fontSize:sz.fs,fontWeight:600,
        cursor:disabled?"not-allowed":"pointer",opacity:disabled?.45:1,
        whiteSpace:"nowrap",transition:"all 120ms ease",...style}}>
      {children}
    </button>
  );
};

const Pill=({children,bg="#EEF0F3",fg=C.ink2,style})=>(
  <span style={{display:"inline-flex",alignItems:"center",gap:5,
    padding:"3px 10px",borderRadius:999,
    background:bg,color:fg,fontSize:11,fontWeight:600,fontFamily:C.sans,...style}}>{children}</span>
);

const SEV={
  high:  {bg:C.redBg,  fg:C.red,   l:"High"},
  medium:{bg:C.amberBg,fg:C.amber, l:"Medium"},
  low:   {bg:C.blueT,  fg:C.blue,  l:"Low"},
};
const Sev=({level})=>{const s=SEV[level];return<Pill bg={s.bg} fg={s.fg}><span style={{width:6,height:6,borderRadius:999,background:s.fg}}/>{s.l}</Pill>;};

const Glyph=({a,size=36})=>(
  <div style={{width:size,height:size,borderRadius:999,background:a.colour,color:"#fff",
    display:"inline-flex",alignItems:"center",justifyContent:"center",
    fontFamily:C.sans,fontWeight:700,fontSize:size*.42,flexShrink:0}}>{a.glyph}</div>
);

const AIStar=({size=16,colour=C.blue,spin})=>(
  <svg width={size} height={size} viewBox="0 0 16 16"
    style={{animation:spin?"aiSpin 1.4s linear infinite":undefined,flexShrink:0}}>
    <g fill={colour}>
      <path d="M8 0.5 L9 6.5 L8 8 L7 6.5 Z"/>
      <path d="M8 15.5 L7 9.5 L8 8 L9 9.5 Z"/>
      <path d="M0.5 8 L6.5 7 L8 8 L6.5 9 Z"/>
      <path d="M15.5 8 L9.5 9 L8 8 L9.5 7 Z"/>
      <circle cx="8" cy="8" r="1.4"/>
    </g>
  </svg>
);

const Card=({children,padding=24,style,hover,onClick})=>{
  const [h,setH]=useState(false);
  return(
    <div onClick={onClick}
      onMouseEnter={()=>hover&&setH(true)} onMouseLeave={()=>hover&&setH(false)}
      style={{background:"#fff",border:`1px solid ${h?C.blue:C.line}`,borderRadius:10,
        padding,cursor:onClick?"pointer":"default",
        boxShadow:h?`0 6px 16px ${C.blue}22`:"none",
        transition:"all 140ms ease",...style}}>{children}</div>
  );
};

const Donut=({value,colour=C.green,size=88,label})=>{
  const r=38,circ=2*Math.PI*r,dash=(value/100)*circ;
  return(
    <div style={{position:"relative",width:size,height:size,flexShrink:0}}>
      <svg width={size} height={size} viewBox="0 0 88 88">
        <circle cx="44" cy="44" r={r} fill="none" stroke={C.muted} strokeWidth="8"/>
        <circle cx="44" cy="44" r={r} fill="none" stroke={colour} strokeWidth="8"
          strokeDasharray={`${dash} ${circ}`} strokeDashoffset={circ/4}
          strokeLinecap="round" transform="rotate(-90 44 44)"/>
      </svg>
      <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
        <span style={{fontSize:20,fontWeight:700,color:C.ink,letterSpacing:"-0.02em"}}>{value}</span>
        {label&&<span style={{fontSize:9,color:C.ink2,fontWeight:600,textTransform:"uppercase",letterSpacing:"0.06em"}}>{label}</span>}
      </div>
    </div>
  );
};

const ConfBar=({value,colour=C.blue})=>(
  <div>
    <div style={{height:4,background:C.muted,borderRadius:999,overflow:"hidden",marginBottom:3}}>
      <div style={{width:`${value}%`,height:"100%",background:colour,borderRadius:999}}/>
    </div>
    <span style={{fontSize:10,color:C.ink2}}>{value}% confidence</span>
  </div>
);

// ── Tracker (2-step) ──────────────────────────────────────────────────────────
const Tracker=({stage})=>{
  const steps=[
    {id:"root",label:"Root Cause"},
    {id:"rem", label:"Rem & Sim"},
  ];
  const stateOf=id=>{
    if(stage==="idle") return "pending";
    if(stage==="running:root") return id==="root"?"running":"pending";
    if(stage==="review:root")  return id==="root"?"review":"pending";
    if(stage==="running:rem")  return id==="root"?"done":"running";
    if(stage==="remediation")  return id==="root"?"done":"active";
    if(stage==="done")         return "done";
    return "pending";
  };
  return(
    <div style={{display:"flex",alignItems:"center",padding:"12px 20px",
      background:"#fff",border:`1px solid ${C.line}`,borderRadius:999,
      boxShadow:"0 2px 6px rgba(0,0,0,0.04)",gap:0}}>
      {steps.map((s,i)=>{
        const st=stateOf(s.id);
        const ag=A[s.id];
        const colour=st==="done"?C.green:st==="running"?C.blue:st==="review"?ag.colour:st==="active"?ag.colour:C.line2;
        const lbl=st==="done"?"✓ Reviewed":st==="running"?"Running…":st==="review"?"Awaiting review":st==="active"?"In progress":"Queued";
        return(
          <React.Fragment key={s.id}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{width:30,height:30,borderRadius:999,
                background:st==="pending"?"#fff":colour,color:st==="pending"?colour:"#fff",
                border:`1.5px solid ${colour}`,
                display:"inline-flex",alignItems:"center",justifyContent:"center",
                fontWeight:700,fontSize:13,
                boxShadow:st==="running"?`0 0 0 5px ${colour}22`:"none",
                animation:st==="running"?"aiPulse 1.8s ease-in-out infinite":undefined}}>
                {i+1}
              </div>
              <div style={{display:"flex",flexDirection:"column"}}>
                <span style={{fontSize:12,fontWeight:700,color:C.ink}}>{s.label}</span>
                <span style={{fontSize:10,color:colour,fontWeight:600}}>{lbl}</span>
              </div>
            </div>
            {i<steps.length-1&&<div style={{flex:1,height:2,background:`linear-gradient(90deg,${colour},${C.line})`,margin:"0 16px",borderRadius:999,minWidth:20}}/>}
          </React.Fragment>
        );
      })}
    </div>
  );
};

// ── Overview ──────────────────────────────────────────────────────────────────
const AIButton=({onClick})=>{
  const [h,setH]=useState(false);
  return(
    <button onClick={onClick} onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
      style={{display:"inline-flex",alignItems:"center",gap:10,height:38,padding:"0 18px",
        background:h?C.blue:C.blueT2,color:h?"#fff":C.blue,
        border:`1.5px solid ${C.blue}`,borderRadius:999,
        fontSize:13,fontWeight:700,cursor:"pointer",
        boxShadow:h?`0 6px 18px ${C.blue}44`:"none",
        transition:"all 160ms ease",whiteSpace:"nowrap"}}>
      <AIStar size={14} colour={h?"#fff":C.blue}/>
      Diagnose &amp; fix →
    </button>
  );

        <div style={{flex:1}}/>
        <Btn variant="primary" size="md" disabled={selList.length===0} onClick={onNext}>
          Run Intelligent Remediation →
        </Btn>

    </div>
  );
};

const CascadeRCMini=({onDone})=>{

    return()=>clearInterval(t);
  },[]);
  return(
    <div style={{padding:"12px 14px 13px",borderTop:`1px solid ${C.line}`,

      <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:8,position:"relative"}}>

          background:`radial-gradient(circle,${C.blueT},${C.blueT2})`,

        <span style={{fontSize:10,color:C.ink2,fontStyle:"italic"}}>{steps[step]}…</span>
        <span style={{fontSize:10,fontWeight:700,color:C.blue,marginLeft:6}}>{Math.round(pct*100)}%</span>
      </div>

      <svg width="200" height="50" style={{display:"block",marginBottom:7,overflow:"visible",position:"relative"}}>
        {MINI_EDGES.map(([a,b],i)=>(
          <line key={i} x1={MINI_NN[a].cx} y1={MINI_NN[a].cy} x2={MINI_NN[b].cx} y2={MINI_NN[b].cy}
            stroke={C.blue} strokeWidth="1" strokeDasharray="4 4" opacity=".4"

              animationTimingFunction:"ease-in-out",animationIterationCount:"infinite",

        ))}
        <rect x="0" y="44" width="200" height="3" rx="1.5" fill={C.line}/>
        <rect x="0" y="44" width={`${pct*200}`} height="3" rx="1.5" fill={C.blue} opacity=".8"
          style={{transition:"width 60ms linear"}}/>
      </svg>

      <div style={{display:"flex",gap:4,alignItems:"center",position:"relative"}}>
        {steps.map((s,i)=>(
          <React.Fragment key={i}>
            <div style={{padding:"2px 8px",borderRadius:999,fontSize:9,fontWeight:600,
              background:i<step?C.blue:i===step?C.blueT2:C.muted,
              border:`1px solid ${i<=step?C.blue:C.line}`,
              color:i<step?"#fff":i===step?C.blue:C.ink3,
              boxShadow:i===step?`0 0 8px ${C.blue}44`:"none",
              display:"flex",alignItems:"center",gap:3,
              transition:"all .2s ease"}}>
              {i<step?"✓":i===step?<AIStar size={7} colour={C.blue} spin/>:"·"} {s}

        ))}

};

// ── RC lookup map ─────────────────────────────────────────────────────────────
const RC_MAP={"FX-RC1":ROOT_CAUSES[0],"FX-RC2":ROOT_CAUSES[1],"FX-RC3":ROOT_CAUSES[2],"FX-RC4":CASCADE_RC};

// ── Combined Remediation + Simulation screen ──────────────────────────────────
const RemSimScreen=({cascade,onApply,onBack,onCancel})=>{
  const [fixes,setFixes]=useState(INITIAL_FIXES);
  const [simming,setSimming]=useState(new Set());
  const [results,setResults]=useState({});
  const [log,setLog]=useState([]);
  const [expandedFix,setExpandedFix]=useState("FX-RC1");
  const [cascadeRCDone,setCascadeRCDone]=useState(new Set());
  const logRef=useRef(null);
  const toggleExpand=id=>setExpandedFix(id);

  useEffect(()=>{
    if(logRef.current) logRef.current.scrollTop=logRef.current.scrollHeight;
  },[log]);

  const simulate=useCallback((fix)=>{
    if(simming.has(fix.id)||results[fix.id])return;
    setSimming(s=>new Set([...s,fix.id]));
    // add placeholder entry
    setLog(prev=>[...prev,{key:fix.id,fixId:fix.id,fixTitle:fix.title,status:"simulating"}]);

    setTimeout(()=>{
      const map=cascade?SIM_RESULTS_CASCADE:SIM_RESULTS_CLEAN;
      const res=map[fix.id]||{status:"safe",ftr:90,readiness:"+5pts",detail:"No issues found."};
      setSimming(s=>{const n=new Set(s);n.delete(fix.id);return n;});

      // If this cascade fix is safe, auto-resolve the parent cascade result
      const isCascadeResolution=res.status==="safe"&&fix.isCascade;
      setResults(r=>{
        const u={...r,[fix.id]:res};
        if(isCascadeResolution){
          Object.keys(u).forEach(k=>{
            if(u[k].status==="cascade"&&u[k].cascadeFix&&u[k].cascadeFix.id===fix.id)
              u[k]={...u[k],status:"cascade-resolved"};
          });
        }
        return u;
      });
      setLog(prev=>{
        // replace simulating placeholder
        const mapped=prev.map(e=>e.fixId===fix.id&&e.status==="simulating"?{...e,...res,status:res.status}:e);
        // if resolving a cascade, flip the parent log entry too
        if(isCascadeResolution){
          return mapped.map(e=>
            e.status==="cascade"&&e.cascadeFix&&e.cascadeFix.id===fix.id
            ?{...e,status:"cascade-resolved"}:e
          );
        }
        return mapped;
      });

      // auto-add cascade fix if new cascade detected
      if(res.status==="cascade"&&res.cascadeFix){
        setFixes(f=>{
          if(f.find(x=>x.id===res.cascadeFix.id))return f;
          return[...f,res.cascadeFix];
        });
        setTimeout(()=>{
          setLog(prev=>[...prev,{key:"cascade-"+fix.id,status:"cascade-notify",cascadeFix:res.cascadeFix}]);
        },200);
      }
    },1400);
  },[simming,results,cascade]);

  const resVals=Object.values(results);
  const allSimulated=fixes.every(f=>results[f.id]);
  const hasUnresolvedCascade=resVals.some(r=>r.status==="cascade");
  const hasSafe=resVals.some(r=>r.status==="safe");
  const canApply=allSimulated&&!hasUnresolvedCascade&&hasSafe;

  const statusColour=s=>s==="safe"||s==="cascade-resolved"?C.green:s==="human"?C.amber:s==="cascade"?C.red:C.blue;
  const statusBg   =s=>s==="safe"||s==="cascade-resolved"?C.greenBg:s==="human"?C.amberBg:s==="cascade"?C.redBg:C.blueT2;
  const statusLabel=s=>s==="safe"?"✓ Safe":s==="human"?"👤 Needs human":s==="cascade"?"⚠ Cascade":s==="cascade-resolved"?"✓ Cascade resolved":"";
  const statusIcon =s=>s==="safe"||s==="cascade-resolved"?"✓":s==="human"?"👤":"⚠";

  const drawerFix=expandedFix?fixes.find(f=>f.id===expandedFix):null;
  const drawerRes=drawerFix?results[drawerFix.id]:null;
  const drawerIsSim=drawerFix?simming.has(drawerFix.id):false;
  const drawerRcDone=drawerFix?cascadeRCDone.has(drawerFix.id):false;
  const drawerCanSim=drawerFix?(!drawerFix.isCascade||drawerRcDone):false;

  const simulateAll=()=>{
    fixes.filter(f=>!results[f.id]&&!simming.has(f.id)&&(!f.isCascade||cascadeRCDone.has(f.id)))
      .forEach(f=>simulate(f));
  };
  const canSimulateAll=fixes.some(f=>!results[f.id]&&!simming.has(f.id)&&(!f.isCascade||cascadeRCDone.has(f.id)));

  return(
    <div style={{flex:1,minHeight:0,display:"flex",flexDirection:"column",overflow:"hidden",background:C.surface}}>
      {/* header */}
      <div style={{padding:"18px 32px",borderBottom:`1px solid ${C.line}`,background:"#fff",display:"flex",alignItems:"center",gap:14}}>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          <Glyph a={A.rem} size={36}/>
          <span style={{fontSize:16,color:C.ink3}}>+</span>
          <div style={{width:36,height:36,borderRadius:999,background:C.green,color:"#fff",
            display:"inline-flex",alignItems:"center",justifyContent:"center",fontWeight:700,fontSize:15}}>S</div>
        </div>
        <div style={{flex:1}}>
          <div style={{fontSize:11,color:A.rem.colour,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.08em"}}>Step 2 · Intelligent Remediation</div>
          <div style={{fontSize:18,fontWeight:700,marginTop:2,letterSpacing:"-0.01em"}}>Test each fix before applying — nothing changes until you say so</div>
        </div>
        <Btn variant="ghost" size="sm" onClick={onBack}>← Back to root causes</Btn>
        <Btn variant="ghost" size="sm" onClick={onCancel}>Cancel</Btn>
      </div>

      {/* split body */}
      <div style={{flex:1,display:"flex",overflow:"hidden"}}>

        {/* LEFT: Remediation plan */}
        <div style={{flex:"0 0 440px",borderRight:`1px solid ${C.line}`,display:"flex",flexDirection:"column",background:"#fff",flexShrink:0,overflow:"hidden"}}>
          <div style={{padding:"12px 20px",borderBottom:`1px solid ${C.line}`,background:C.muted,display:"flex",alignItems:"center",gap:10}}>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:700}}>Fixes to run</div>
              <div style={{fontSize:11,color:C.ink2,marginTop:2}}>{fixes.length} proposed fixes · {fixes.reduce((s,f)=>s+f.records,0).toLocaleString()} reports to correct</div>
            </div>
            {canSimulateAll&&(
              <Btn size="sm" variant="soft" onClick={simulateAll}>Simulate all →</Btn>
            )}
          </div>

          <div style={{flex:1,minHeight:0,overflowY:"auto",padding:16,display:"flex",flexDirection:"column",gap:10}}>
            {fixes.map(fix=>{
              const res=results[fix.id];
              const isSim=simming.has(fix.id);
              const rcDone=cascadeRCDone.has(fix.id);
              const isActive=expandedFix===fix.id;
              const confVal=fix.isCascade&&rcDone?CASCADE_RC.confidence:fix.confidence;
              const stripCol=confVal>=85?C.red:confVal>=75?C.amber:C.blue;
              return(
                <div key={fix.id} className={fix.isCascade?"slideIn":undefined}
                  onClick={()=>toggleExpand(fix.id)}
                  style={{overflow:"hidden",borderRadius:10,cursor:"pointer",
                    border:`1px solid ${isActive?A.rem.colour+"99":res?statusColour(res.status)+"44":C.line}`,
                    background:"#fff",
                    outline:isActive?`2px solid ${A.rem.colour}33`:"none",outlineOffset:1,
                    transition:"border-color 140ms ease,outline 140ms ease"}}>

                  {/* severity strip */}
                  <div style={{height:3,background:res?statusColour(res.status):stripCol,borderRadius:"9px 9px 0 0"}}/>

                  <div style={{padding:"14px 16px"}}>
                    {/* top row */}
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:12,flexWrap:"wrap"}}>
                      <span style={{fontSize:10,color:C.ink3,fontWeight:700,letterSpacing:"0.05em"}}>{fix.id}</span>
                      {fix.isCascade&&<Pill bg={C.amberBg} fg={C.amber}>↻ Cascade</Pill>}
                      {res&&<Pill bg={statusBg(res.status)} fg={statusColour(res.status)}>{statusLabel(res.status)}</Pill>}
                      <div style={{flex:1}}/>
                      <span style={{fontSize:11,color:isActive?A.rem.colour:C.ink3,fontWeight:600,transition:"color 140ms ease"}}>

            display:"flex",alignItems:"center",gap:14,
            transition:"background 300ms ease"}}>
            <div style={{width:42,height:42,borderRadius:10,flexShrink:0,
              background:"linear-gradient(135deg,#003078,#005EB8)",color:"#fff",
              display:"flex",alignItems:"center",justifyContent:"center",
              fontSize:13,fontWeight:800,letterSpacing:"-0.02em"}}>FCA</div>
            <div style={{flex:1}}>
              <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                <span style={{fontSize:14,fontWeight:700}}>Transaction Reporting — Errors &amp; Omissions Notification</span>
                {eoReady&&<Pill bg={C.blue} fg="#fff" style={{fontSize:9}}>✦ Pre-filled by En>ACT agents</Pill>}
              </div>
              <div style={{fontSize:11,color:C.ink2,marginTop:2}}>FCA MRT · mrt@fca.org.uk · Commission Delegated Regulation (EU) 2017/590</div>
            </div>
            {!eoReady&&!eoGenerating&&(
              <Btn variant="primary" size="md" onClick={generateEo}>
                <AIStar size={11} colour="#fff"/>Generate E&amp;O →
              </Btn>
            )}
            {eoGenerating&&(
              <div style={{display:"flex",alignItems:"center",gap:8,fontSize:12,color:C.blue,fontWeight:600}}>
                <AIStar size={15} colour={C.blue} spin/>Generating…
              </div>
            )}
            {eoReady&&(
              <Btn variant="ghost" size="sm" onClick={()=>setEoOpen(v=>!v)}>
                {eoOpen?"Collapse ▲":"Expand ▼"}
              </Btn>
            )}
          </div>

          {/* generating shimmer */}
          {eoGenerating&&(
            <div style={{padding:"28px 24px",display:"flex",flexDirection:"column",gap:14,alignItems:"center"}}>
              <div style={{width:"100%",height:7,background:C.line,borderRadius:999,overflow:"hidden",position:"relative"}}>
                <div style={{position:"absolute",inset:0,
                  background:`linear-gradient(90deg,${C.blue},${C.blueT2},${C.blue})`,
                  backgroundSize:"200% 100%",animation:"shimmerSlide .9s ease infinite"}}/>
              </div>
              <div style={{fontSize:12,color:C.ink2,display:"flex",alignItems:"center",gap:8}}>
                <AIStar size={13} colour={C.blue} spin/>
                Pre-filling sections 2.2–2.7 from Root Cause · sections 3.2–3.3 from Simulation…
              </div>
            </div>
          )}

          {/* empty state */}
          {!eoReady&&!eoGenerating&&(
            <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16,padding:40,color:C.ink3}}>
              <div style={{width:64,height:64,borderRadius:999,background:C.muted,display:"flex",alignItems:"center",justifyContent:"center",fontSize:28}}>📋</div>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:15,fontWeight:600,color:C.ink2,marginBottom:6}}>E&amp;O notification ready to generate</div>
                <div style={{fontSize:12,lineHeight:1.6,maxWidth:320}}>
                  Click <b>Generate E&amp;O →</b> to pre-fill sections 2.2–2.7 from Root Cause findings
                  and sections 3.2–3.3 from Simulation results.
                </div>
              </div>
            </div>
          )}

          {/* E&O form body */}
          {eoReady&&eoOpen&&(
            <>
              <div className="slideIn" style={{flex:1,minHeight:0,overflowY:"auto",padding:"20px 24px",display:"flex",flexDirection:"column",gap:10}}>

                <EoSection num="1" title="General Details">
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
                    <EoField label="1.0 Date" value="13 May 2026" agent/>
                    <EoField label="1.1 Executing entity" value="Whale Capital" agent/>
                    <EoField label="1.2 LEI" value="6PTKHDJ8HDUF78PFWH30" agent/>
                    <EoField label="1.3 Type of firm" value="Electronic Money Institution / PSP" agent/>
                    <EoField label="1.4 Submitting ARM" value="DFR Reporting Platform" agent/>
                    <EoField label="1.5 Contact name &amp; title" required hint="Enter contact name and job title"/>
                    <EoField label="1.6 Contact email" required hint="Enter email address"/>
                    <EoField label="1.7 Contact telephone" required hint="Enter telephone number"/>
                  </div>
                </EoSection>

                <EoSection num="2" title="Details of Errors or Omissions" open>
                  <EoField label="2.1 Relevant regulation" agent
                    value="Commission Delegated Regulation (EU) 2017/590, Article 15(2) — MiFID II transaction reporting; CFTC Part 45 swap data reporting"/>
                  <EoField label="2.2 Details of issue and scope" agent
                    value="3 structural data errors across FX Swap/Forward records affecting 5,411 reports via DFR_Reporting_RAW_Feed: (1) CP2 LEI lookup failure — broker_lei_ref_dict missing 3 counterparties onboarded post 14 Jan 2026, 415 records, field 1_14_counterparty_2; (2) CP2 financial entity indicator mismatch — intragroup_flag absent from 1_17 derivation logic, 184 records; (3) Notional precision loss — Original_TargetAmount at 2dp with no expansion step, 4,812 records, field 1_31_notional_amt_leg_1."/>
                  <EoField label="2.3 Field(s) with error / omission" agent
                    value="1_14_counterparty_2 (415) · 1_17_counterparty_2_financial_entity_indicator (184) · 1_31_notional_amt_leg_1 (4,812). Secondary: 1_15_counterparty_2_identifier_source (89) and 1_31_notional_amt_leg_2 (assessment pending)."/>
                  <EoField label="2.4 Root cause" agent
                    value="(1) broker_lei_ref_dict not updated post 3 new onboardings after 14 Jan 2026 — CLIENT_ID → PartyFile.TradePartyValue lookup failing. (2) 1_17 derivation references TradePartyValue LEI only; intragroup_flag not consulted — confirmed absent in lineage mapping. (3) DFR Formatting step maps Original_TargetAmount 1-1 to 1_31 with no precision expansion — 2dp transmitted where 6dp required."/>
                  <EoField label="2.5 How discovered" agent
                    value="Detected by En>ACT Root Cause Analysis Agent on 09 May 2026 via automated lineage analysis. Validated by DFR lineage mapping audit."/>
                  <EoField label="2.6 Period for which issue occurred" agent
                    value="Issues 1 &amp; 2: estimated onset 14 Jan 2026 (last dict refresh); detected 09 May 2026. Issue 3: onset under review — pipeline unchanged for extended period; back-reporting window TBC pending Compliance sign-off."/>
                  <EoField label="2.7 Total reports impacted" agent
                    value="5,411 confirmed (415 + 184 + 4,812). 691 remediated and safe to back-report (FX-RC1 + FX-RC2 + FX-RC4, avg FTR 93%). 4,812 (FX-RC3) pending Compliance review."/>
                </EoSection>

                <EoSection num="3" title="Remediation &amp; Back-Reporting" open>
                  <EoField label="3.1 Oversight responsibility" required hint="Name the individual or committee with oversight"/>
                  <EoField label="3.2 Actions taken to remediate" agent
                    value="En>ACT auto-applied 3 fixes: (1) broker_lei_ref_dict updated — 415 records re-derived and back-reported; (2) intragroup_flag → 1_17 derivation rule added — 184 records corrected; (3) DFR recon feed key rebuilt for 92 cascade records. Outstanding: FX-RC3 precision fix pending Compliance sign-off (312-record valuation tolerance risk). Assessment of 1_31_notional_amt_leg_2 outstanding."/>
                  <EoField label="3.3 Total transactions to back-report" agent
                    value="691 back-reported (readiness 97.3%). 4,812 pending Compliance sign-off (FX-RC3, est. 10 business days from approval)."/>
                  <EoField label="3.4 Systems &amp; controls weaknesses" required hint="Detail weaknesses identified"/>
                  <EoField label="3.5 Plans to address weaknesses" required hint="Detail remediation plans for control gaps"/>
                </EoSection>

                <EoSection num="4" title="On-Going Monitoring &amp; Governance">
                  <EoField label="4.1 Planned audit / compliance monitoring" required hint="Detail planned reviews and scope"/>
                  <EoField label="4.4 Last reconciliation summary" agent
                    value="Reconciliation rate: 89.5% (↓1.9%). 10,584 breaks. 7,456 open issues across 3 clusters. En>ACT monitoring active — next refresh 16 May 2026."/>
                </EoSection>

              </div>

              {/* sticky footer — always visible */}
              <div style={{flexShrink:0,padding:"12px 24px",borderTop:`1px solid ${C.line}`,background:"#fff",
                display:"flex",alignItems:"center",gap:10}}>
                {!jira?(
                  <div style={{fontSize:11,color:C.amber,display:"flex",alignItems:"center",gap:6,flex:1,minWidth:0}}>
                    <span style={{flexShrink:0}}>⚠</span>
                    <span style={{overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>Raise Jira ticket for FX-RC3 Compliance review before submitting</span>
                  </div>
                ):(
                  <div style={{fontSize:11,color:C.green,display:"flex",alignItems:"center",gap:6,flex:1}}>
                    <span>✓</span><span>Compliance ticket raised — ready to submit</span>
                  </div>
                )}
                <div style={{display:"flex",gap:8,flexShrink:0}}>
                  <Btn variant="default" size="md">↓ Download PDF draft</Btn>
                </div>
              </div>
            </>
          )}

          {/* E&O ready but collapsed */}
          {eoReady&&!eoOpen&&(
            <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:12,padding:40}}>
              <div style={{width:56,height:56,borderRadius:999,background:C.blueT2,display:"flex",alignItems:"center",justifyContent:"center",fontSize:26}}>✦</div>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:14,fontWeight:700,color:C.blue}}>E&amp;O form pre-filled</div>
                <div style={{fontSize:12,color:C.ink2,marginTop:4}}>7 sections · 14 agent-generated fields · 5 required fields</div>
              </div>
              <Btn variant="primary" size="md" onClick={()=>setEoOpen(true)}>Review &amp; submit →</Btn>
            </div>
          )}
        </div>
      </div>
    </div>
  );
};

// ── Tweaks panel ──────────────────────────────────────────────────────────────
const TweaksPanel=({cascadeOn,setCascade})=>{
  const [open,setOpen]=useState(false);
  return(
    <>
      <button onClick={()=>setOpen(o=>!o)}
        style={{position:"fixed",right:16,bottom:16,zIndex:9999,
          width:40,height:40,borderRadius:999,border:`1.5px solid ${C.blue}`,
          background:open?C.blue:"#fff",color:open?"#fff":C.blue,
          cursor:"pointer",fontSize:16,display:"flex",alignItems:"center",justifyContent:"center",
          boxShadow:"0 4px 12px rgba(0,0,0,0.12)",transition:"all 140ms ease"}}>⚙</button>
      {open&&(
        <div className="twk-panel">
          <div className="twk-hd"><b>Tweaks</b><button className="twk-x" onClick={()=>setOpen(false)}>✕</button></div>
          <div className="twk-body">
            <div className="twk-sect">Simulation behaviour</div>
            <div className="twk-sub">Controls what happens when FX-RC2 is simulated.</div>
            <div className="twk-row-h">
              <span className="twk-lbl">Cascade mode</span>
              <button type="button" className="twk-toggle" data-on={cascadeOn?"1":"0"}
                onClick={()=>setCascade(v=>!v)}><i/></button>
            </div>
            <div className="twk-hint">On: FX-RC2 simulation triggers a downstream cascade — a new fix is auto-added to the plan. Off: all three fixes simulate cleanly.</div>
          </div>
        </div>
      )}
    </>
  );
};

// ── App ───────────────────────────────────────────────────────────────────────
function App(){
  const [stage,   setStage   ]=useState("idle");
  const [cascade, setCascade ]=useState(true);

  const startAgent=id=>{
    setStage(`running:${id}`);
    setTimeout(()=>setStage(id==="root"?"review:root":"remediation"),A[id].duration);
  };

  const sidebar=(
    <div style={{width:200,background:C.navy,color:"#fff",padding:"22px 16px",display:"flex",flexDirection:"column",gap:6,flexShrink:0}}>
      <div style={{display:"flex",alignItems:"center",gap:10,padding:"0 4px 18px",borderBottom:"1px solid #ffffff20",marginBottom:14}}>
        <AIStar size={16} colour="#fff"/>
        <span style={{fontSize:14,fontWeight:700}}>En>ACT</span>
      </div>
      {["Overview","Accuracy","Completeness","Timeliness","Benchmarking"].map((n,i)=>(
        <div key={i} style={{padding:"8px 10px",borderRadius:6,background:i===0?"#ffffff15":"transparent",fontSize:12,color:i===0?"#fff":"#ffffffb0",display:"flex",alignItems:"center",gap:8,cursor:"pointer"}}>
          <span style={{width:8,height:8,borderRadius:2,background:"#ffffff40"}}/>{n}
        </div>
      ))}
      <div style={{marginTop:16,marginBottom:6,fontSize:9,color:"#ffffff60",textTransform:"uppercase",letterSpacing:"0.08em",paddingLeft:10}}>Re:ACT</div>
      {["Issue management","Remediation","Sign-off"].map((n,i)=>(
        <div key={i} style={{padding:"8px 10px",fontSize:12,color:"#ffffffb0",display:"flex",alignItems:"center",gap:8,cursor:"pointer"}}>
          <span style={{width:8,height:8,borderRadius:2,background:"#ffffff40"}}/>{n}
        </div>
      ))}
      <div style={{flex:1}}/>
      <div style={{display:"flex",alignItems:"center",gap:10,padding:10,border:"1px solid #ffffff20",borderRadius:8}}>
        <div style={{width:26,height:26,borderRadius:999,background:"#5EA0DF",color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700}}>MB</div>
        <div>
          <div style={{fontSize:12,fontWeight:600}}>Sarah Chen</div>
          <div style={{fontSize:10,opacity:.6}}>Whale Capital</div>
        </div>
      </div>
    </div>
  );

  return(
    <div style={{width:"100%",height:"100vh",display:"flex",overflow:"hidden",background:C.surface}}>
      <TweaksPanel cascadeOn={cascade} setCascade={setCascade}/>
      {sidebar}
      <div style={{flex:1,display:"flex",flexDirection:"column",minWidth:0,minHeight:0,overflow:"hidden",position:"relative"}}>
        {stage!=="idle"&&stage!=="done"&&(
          <div style={{padding:"14px 36px 0",display:"flex"}}>
            <Tracker stage={stage}/>
          </div>
        )}
        {stage==="idle"        &&<Overview onTrigger={()=>startAgent("root")}/>}
        {stage==="running:root"&&<AgentRunning agent={A.root}/>}
        {stage==="review:root" &&<ReviewRoot onNext={()=>startAgent("rem")} onCancel={()=>setStage("idle")}/>}
        {stage==="running:rem" &&(
          <div style={{flex:1,display:"flex",minHeight:0,overflow:"hidden"}}>
            <div style={{flex:"0 0 480px",overflow:"hidden",pointerEvents:"none",opacity:.5,position:"relative",borderRight:`1px solid ${C.line}`}}>
              <ReviewRoot onNext={()=>{}} onCancel={()=>{}}/>
            </div>
            <AgentRunning agent={A.rem}/>
          </div>
        )}
        {stage==="remediation" &&<RemSimScreen cascade={cascade} onApply={()=>setStage("done")} onBack={()=>setStage("review:root")} onCancel={()=>setStage("idle")}/>}
        {stage==="done"        &&<DoneScreen onRestart={()=>setStage("idle")}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
